---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app discord-bot-autoscaler
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: discord-bot-autoscaler

  values:
    controllers:
      discord-bot-autoscaler:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mirceanton/discord-bot-autoscaler
              tag: v1.1.0
            env:
              TZ: Europe/Bucharest
              CONFIG_FILE_PATH: /config/services.yaml
              STATE_FILE_PATH: /data/state.json
              SERVER_HOST: 0.0.0.0
              SERVER_PORT: "8080"
              LOG_LEVEL: info
              LOG_FORMAT: json
              DISCORD_GUILD_ID:
                valueFrom:
                  secretKeyRef:
                    name: discord-bot-autoscaler-secret
                    key: DISCORD_GUILD_ID
              DISCORD_BOT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: discord-bot-autoscaler-secret
                    key: DISCORD_BOT_TOKEN

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: discord-bot-autoscaler
        ports:
          http:
            port: 8080

    serviceAccount:
      discord-bot-autoscaler: {}

    rbac:
      roles:
        discord-bot-autoscaler-watcher:
          type: ClusterRole
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets"]
              verbs: ["get"]
      bindings:
        discord-bot-autoscaler-watcher:
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            identifier: discord-bot-autoscaler-watcher
          subjects:
            - identifier: discord-bot-autoscaler

    configMaps:
      config:
        data:
          services.yaml: |
            ---
            activationWindow: 10m
            services:
              llama-server:
                namespace: ai
                workloadKind: StatefulSet

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
