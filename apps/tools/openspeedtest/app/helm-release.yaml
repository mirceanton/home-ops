---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openspeedtest
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openspeedtest

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      openspeedtest:
        containers:
          openspeedtest:
            image:
              repository: openspeedtest/latest
              tag: v2.0.6
            env:
              # Image default is DOMAIN_NAME=false (non-empty string), which
              # makes `if [ "$DOMAIN_NAME" ]` truthy and triggers sed -i on
              # the nginx config. Override to empty to prevent that.
              DOMAIN_NAME: ""
            resources:
              requests:
                cpu: 20m
                memory: 32Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    service:
      openspeedtest:
        ports:
          http:
            port: &port 3000

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      nginx-cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/nginx
      nginx-log:
        type: emptyDir
        globalMounts:
          - path: /var/log/nginx
      nginx-run:
        type: emptyDir
        globalMounts:
          - path: /var/run

    route:
      home:
        hostnames: ["speedtest.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
