---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openspeedtest
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: tools

  path: ./apps/tools/openspeedtest/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute: {}

  decryption: {provider: sops}
