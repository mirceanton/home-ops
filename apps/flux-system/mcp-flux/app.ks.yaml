---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mcp-flux
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 5m
  targetNamespace: flux-system

  path: ./apps/flux-system/mcp-flux/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app

  dependsOn: []
