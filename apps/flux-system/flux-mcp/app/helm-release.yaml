---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: flux-mcp

  values:
    fullnameOverride: flux-mcp
    transport: http # sse for server-sent events, http for streamable HTTP
    readonly: false

    networkPolicy:
      create: false
      ingress:
        namespaces: []

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 1Gi
