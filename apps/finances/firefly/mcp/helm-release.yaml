---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: firefly-mcp

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      firefly-mcp:
        containers:
          app:
            image:
              repository: ghcr.io/daften/fireflyiii-mcp
              tag: 0.2.2

            env:
              FIREFLY_URL: "http://firefly.finances.svc.cluster.local:8080"
              MCP_BASE_URL: "http://firefly-mcp.finances.svc.cluster.local:3000"
              FIREFLY_OAUTH_CLIENT_ID: "litellm-internal"

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /.well-known/oauth-authorization-server
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /.well-known/oauth-authorization-server
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: firefly-mcp
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
