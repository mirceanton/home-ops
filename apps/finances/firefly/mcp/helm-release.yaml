---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: firefly-mcp

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      firefly-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          # MCP server binds to loopback only — not reachable from outside the pod
          mcp-server:
            image:
              repository: ghcr.io/daften/fireflyiii-mcp
              tag: 0.2.2

            command:
              - node
              - dist/index.js
              - --transport
              - http
              - --host
              - 127.0.0.1
              - --port
              - "3001"

            env:
              FIREFLY_URL: "http://firefly.finances.svc.cluster.local:8080"
              # Required by HTTP transport; value is arbitrary since OAuth flow is not used
              FIREFLY_OAUTH_CLIENT_ID: "litellm-internal"
              MCP_BASE_URL: "http://firefly-mcp.finances.svc.cluster.local:3000"

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

          # nginx proxy injects the Firefly token as a Bearer header before forwarding to port 3001
          proxy:
            image:
              repository: nginx
              tag: alpine

            command: ["/bin/sh", "-c"]
            args:
              - sed "s|__FIREFLY_TOKEN__|$FIREFLY_TOKEN|g" /etc/nginx/templates/proxy.conf.template > /etc/nginx/conf.d/proxy.conf && exec nginx -g "daemon off;"

            env:
              FIREFLY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: firefly-mcp-secret
                    key: FIREFLY_TOKEN

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: firefly-mcp
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      nginx-conf-d:
        type: emptyDir
        advancedMounts:
          firefly-mcp:
            proxy:
              - path: /etc/nginx/conf.d
      nginx-cache:
        type: emptyDir
        advancedMounts:
          firefly-mcp:
            proxy:
              - path: /var/cache/nginx
      nginx-run:
        type: emptyDir
        advancedMounts:
          firefly-mcp:
            proxy:
              - path: /var/run
      nginx-config:
        type: configMap
        name: firefly-mcp-nginx-config
        advancedMounts:
          firefly-mcp:
            proxy:
              - path: /etc/nginx/templates
