---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: firefly-mcp

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      firefly-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/daften/fireflyiii-mcp
              tag: 0.3.0@sha256:4c0eb659c8de2d6b86b4e8c65b23182623894a3156a578f2ee88fb50552d893e

            env:
              FIREFLY_URL: "http://firefly.finances.svc.cluster.local:8080"
              # Public OAuth client (no secret) registered solely to satisfy this
              # image's startup check. The actual credential is a PAT, forwarded
              # by litellm as a Bearer token — the OAuth flow is never exercised.
              # Remove once daften/fireflyiii-mcp ships native PAT-only HTTP mode
              # (https://github.com/daften/fireflyiii-mcp/pull/30).
              FIREFLY_OAUTH_CLIENT_ID: "019ed106-79b5-7361-8613-765e72e38098"
              MCP_BASE_URL: "http://firefly-mcp.finances.svc.cluster.local:3000"

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: firefly-mcp
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
