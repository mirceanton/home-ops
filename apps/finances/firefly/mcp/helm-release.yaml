---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: firefly-mcp

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      firefly-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/fabianonetto/mcp-server-firefly-iii
              tag: main@sha256:46dce54fdca3f0b919052bad9bf04a17fb0d4deed63ee5a871eca1d3bbbf516a

            env:
              FIREFLY_URL: "http://firefly.finances.svc.cluster.local:8080"
              PORT: "3000"
              FIREFLY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: firefly-mcp-secret
                    key: FIREFLY_TOKEN

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: firefly-mcp
        ports:
          http:
            port: 3000

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
