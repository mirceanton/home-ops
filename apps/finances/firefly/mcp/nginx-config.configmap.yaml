---
apiVersion: v1
kind: ConfigMap
metadata:
  name: firefly-mcp-nginx-config
  annotations:
    # Prevent Flux from mangling __FIREFLY_TOKEN__ placeholder with variable substitution
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  proxy.conf.template: |
    server {
        listen 3000;

        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Authorization "Bearer __FIREFLY_TOKEN__";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
        }
    }
