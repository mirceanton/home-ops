---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sure
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: sure

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      web:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers: &initContainers
          fix-tmp-permissions:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command: ["sh", "-c", "chown 1000:1000 /tmp /rails/tmp && chmod 700 /tmp /rails/tmp"]
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

          wait-for-postgres:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DB_URL)"]
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: sure-postgres-app
                    key: uri

          wait-for-dragonfly:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["redis", "redis://sure-dragonfly:6379"]

        containers:
          app:
            image:
              repository: ghcr.io/we-promise/sure
              tag: 0.7.2

            envFrom:
              - secretRef: { name: sure-secret }
            env: &sure_env
              TZ: "Europe/Bucharest"
              SELF_HOSTED: "true"
              APP_DOMAIN: "sure.home.mirceanton.com"
              RAILS_FORCE_SSL: "false"
              RAILS_ASSUME_SSL: "true"

              POSTGRES_USER:
                valueFrom:
                  secretKeyRef: { name: sure-postgres-app, key: username }
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: sure-postgres-app, key: password }
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef: { name: sure-postgres-app, key: dbname }
              DB_HOST:
                valueFrom:
                  secretKeyRef: { name: sure-postgres-app, key: host }
              DB_PORT:
                valueFrom:
                  secretKeyRef: { name: sure-postgres-app, key: port }

              REDIS_URL: "redis://sure-dragonfly:6379/0"

              # Chat assistant + auto-categorization/merchant detection, routed through the LiteLLM gateway
              OPENAI_URI_BASE: "https://llm.home.mirceanton.com/v1"
              OPENAI_MODEL: "qwen-4b"

              # Sure's default (2048) is far below what our local models actually support
              # (qwen3-4b is configured with --ctx-size 32768); raise so tool-calling
              # requests with larger fixed-prompt overhead (e.g. merchant detection) fit.
              LLM_CONTEXT_WINDOW: "8192"

              # Family-vault document search (RAG), backed by the pgvector extension on this CNPG cluster
              VECTOR_STORE_PROVIDER: "pgvector"
              EMBEDDING_MODEL: "qwen3-embedding-0.6b"
              EMBEDDING_DIMENSIONS: "1024" # verify against the actual model's output dimension
              EMBEDDING_URI_BASE: "https://llm.home.mirceanton.com/v1"

              # Native OIDC login via Keycloak (Homelab realm) - register the client there first
              OIDC_ISSUER: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab"
              OIDC_CLIENT_ID: "sure"
              OIDC_REDIRECT_URI: "https://sure.home.mirceanton.com/auth/openid_connect/callback"

              EXCHANGE_RATE_PROVIDER: "yahoo_finance"
              SECURITIES_PROVIDER: "yahoo_finance"

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: &port 3000
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1.5Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      worker:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers: *initContainers

        containers:
          sidekiq:
            image:
              repository: ghcr.io/we-promise/sure
              tag: 0.7.2
            args: ["bundle", "exec", "sidekiq"]

            env: *sure_env
            envFrom:
              - secretRef: { name: sure-secret }

            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 1Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      app:
        controller: web
        ports:
          http:
            port: 3000

    route:
      home:
        hostnames: ["sure.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /rails/storage
      tmp:
        type: emptyDir
        globalMounts:
          - path: /rails/tmp
          - path: /tmp
      log:
        type: emptyDir
        globalMounts:
          - path: /rails/log
