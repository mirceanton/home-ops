---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./oci-repository.yaml
  - ./helm-release.yaml
  - ./external-secret.yaml

configMapGenerator:
  - name: selkies-sunshine-config
    options:
      disableNameSuffixHash: true
    files:
      - files/sunshine.conf
      - files/apps.json
