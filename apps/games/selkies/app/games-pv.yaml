---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: selkies-games
spec:
  capacity: {storage: 1Ti}
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: selkies-games
  csi:
    driver: org.democratic-csi.iscsi
    volumeHandle: tank/ZVOLs/mircea-steamlib
    fsType: ext4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: selkies-games
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ""
  volumeName: selkies-games
  resources:
    requests: {storage: 1Ti}
