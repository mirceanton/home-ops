# Base config
sunshine_name = steam-sunshine
origin_web_ui_allowed = lan

file_apps = /etc/sunshine/apps.json

# Optional environment-driven settings
csrf_allowed_origins = https://10.0.10.15

# min_log_level = debug
min_log_level = info
# min_log_level = warning
# min_log_level = error

capture = nvfbc
# capture = x11
# capture = kms

# Pin audio capture to Sunshine's own stereo virtual sink. Without this, Sunshine
# captures the monitor of the *default* sink, but on session-end it tries to
# restore the original default (auto_null, which doesn't persist), leaving the
# default broken -> "Found default monitor by name: " (empty) -> no audio after
# the first connect. Pinning the sink bypasses the default-sink churn entirely.
audio_sink = sink-sunshine-stereo

# 1 = fastest, 7 = highest quality.
nvenc_preset = 3

nvenc_twopass = disabled
# nvenc_twopass = quarter_res
# nvenc_twopass = full_res
nvenc_spatial_aq = enabled

# nvenc_spatial_aq = disabled

# AV1 is advertised by default (av1_mode 0). 3 also advertises the 10-bit/HDR
# profiles so an AV1-capable Moonlight client can pick AV1 (and HDR if enabled).
# The client chooses the codec; this only controls what the server offers.
av1_mode = 3

# Lower latency at the expense of compression efficiency
fec_percentage = 20

# Enable QoS tagging on supported networks
upnp = enabled
