---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gow
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: gow-secret
    creationPolicy: Owner

  data:
    - secretKey: SUNSHINE_USER
      remoteRef:
        key: Games on Whales
        property: username
    - secretKey: SUNSHINE_PASS
      remoteRef:
        key: Games on Whales
        property: password
