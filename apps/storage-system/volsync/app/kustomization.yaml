---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./oci-repository.yaml
  - ./helm-release.yaml
  - ./mutating-admission-policy.yaml

  - ./prometheus-rule.yaml
  - ./grafana-dashboard.yaml

configMapGenerator:
  - name: volsync-dashboard
    options:
      disableNameSuffixHash: true
    files:
      - dashboard.json
