---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app convertx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: convertx

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      convertx:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/c4illin/convertx
              tag: v0.18.0
            env:
              TZ: Europe/Bucharest
              AUTO_DELETE_EVERY_N_HOURS: "1"
              ALLOW_UNAUTHENTICATED: "true"
              ACCOUNT_REGISTRATION: "false"
              HTTP_ALLOWED: "false"
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: convertx-secret
                    key: JWT_SECRET

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: convertx
        ports:
          http:
            port: 3000

    route:
      home:
        hostnames: ["convert.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /app/data
