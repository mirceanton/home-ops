---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./helm-release.yaml
  - ./oci-repository.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: homer-config
    files:
      - config.yml=files/config.yaml
      - admin.yml=files/admin.yaml
      - bomkii.yml=files/bomkii.yaml
      - mirceanton.yml=files/mirceanton.yaml
