---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app budget-board
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: budget-board

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 64198
            runAsGroup: 0
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          wait-for-postgres:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DB_URL)"]
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: uri }

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

        containers:
          app:
            image:
              repository: ghcr.io/teelur/budget-board/server
              tag: v3.6.3

            envFrom:
              - secretRef: { name: budget-board-secret }
            env:
              Logging__LogLevel__Default: Information
              TZ: Europe/Bucharest
              CLIENT_ADDRESS: budget-board-client
              DISABLE_NEW_USERS: "false"
              DISABLE_LOCAL_AUTH: "true"
              AUTO_UPDATE_DB: "true"
              DISABLE_AUTO_SYNC: "false"
              SYNC_INTERVAL_HOURS: "8"

              POSTGRES_HOST:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: host }
              POSTGRES_PORT:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: port }
              POSTGRES_DATABASE:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: dbname }
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: username }
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: budget-board-postgres-app, key: password }

              OIDC_ENABLED: "true"
              OIDC_ISSUER: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab"
              OIDC_CLIENT_ID: "sure"

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8080
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      client:
        annotations:
          reloader.stakater.com/auto: "true"

        # nginx:alpine's default non-root user
        pod:
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          copy-html:
            image:
              repository: ghcr.io/teelur/budget-board/client
              tag: v3.6.3
            command: ["sh", "-c", "cp -a /usr/share/nginx/html/. /html-init/"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

        containers:
          app:
            image:
              repository: ghcr.io/teelur/budget-board/client
              tag: v3.6.3

            env:
              PORT: "6253"
              VITE_SERVER_ADDRESS: budget-board-server
              VITE_OIDC_ENABLED: "true"
              VITE_OIDC_PROVIDER: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab"
              VITE_OIDC_CLIENT_ID: "sure"
              VITE_DISABLE_NEW_USERS: "false"
              VITE_DISABLE_LOCAL_AUTH: "true"

            probes:
              liveness: &cprobe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &cport 6253
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *cprobe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *cport
                  periodSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      server:
        controller: server
        ports:
          http:
            port: 8080
      client:
        controller: client
        ports:
          http:
            port: 6253

    persistence:
      html:
        type: emptyDir
        advancedMounts:
          client:
            copy-html:
              - path: /html-init
            app:
              - path: /usr/share/nginx/html
      nginx-conf:
        type: emptyDir
        advancedMounts:
          client:
            app:
              - path: /etc/nginx/conf.d
      nginx-cache:
        type: emptyDir
        advancedMounts:
          client:
            app:
              - path: /var/cache/nginx
      nginx-log:
        type: emptyDir
        advancedMounts:
          client:
            app:
              - path: /var/log/nginx
      nginx-run:
        type: emptyDir
        advancedMounts:
          client:
            app:
              - path: /var/run
      tmp:
        type: emptyDir
        advancedMounts:
          client:
            app:
              - path: /tmp
      logs:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /app/Logs
      server-tmp:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /tmp

    route:
      home:
        hostnames: ["budget.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: client
                port: http
