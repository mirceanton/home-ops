---

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword.security-system.svc.cluster.local
      vaults:
        kubernetes-home-ops: 1
        mikrotik-users: 2
        Automation: 3 #! TODO: remove me once we have migrated all secrets
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-token
            namespace: security-system
            key: token
