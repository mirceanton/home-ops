---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app keycloak-operator
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: security-system

  path: ./apps/security-system/keycloak-operator/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app

  decryption: { provider: sops }
  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: external-secrets-operator
      namespace: security-system
