---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak-operator
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: keycloak-operator

  values:
    replicaCount: 1

    image:
      repository: ghcr.io/hostzero-gmbh/keycloak-operator
      pullPolicy: IfNotPresent

    serviceAccount:
      create: true

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    leaderElection:
      enabled: true

    metrics:
      enabled: true
      port: 8080
      serviceMonitor:
        enabled: true
        additionalLabels: {}
        interval: 30s
        scrapeTimeout: 10s

    health:
      port: 8081

    logging:
      level: info
      format: json
      development: false

    performance:
      syncPeriod: "5m"
      maxConcurrentRequests: 10

    rbac:
      create: true

    crds:
      install: true
      keep: true
