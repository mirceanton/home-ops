---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-plugins
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: database-system

  path: ./apps/database-system/cloudnative-pg/plugins/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute: {}

  dependsOn:
    - name: cloudnative-pg-operator
      namespace: database-system
