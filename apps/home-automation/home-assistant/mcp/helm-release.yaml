---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: home-assistant-mcp

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      home-assistant-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/homeassistant-ai/ha-mcp
              tag: 7.8.1@sha256:8639b177d83bc27a74332ea83513e961fbe7e1a9504c945d979a9e0a914ffe69
            args: ["ha-mcp-web"]
            env:
              TZ: Europe/Bucharest
              MCP_PORT: "8086"
              MCP_SECRET_PATH: /mcp
              HOMEASSISTANT_URL: http://home-assistant.home-automation.svc.cluster.local:8123
              HOMEASSISTANT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: home-assistant-mcp-secret
                    key: HOMEASSISTANT_TOKEN

            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: home-assistant-mcp
        ports:
          http:
            port: 8086

    #? do i even need to expose this outside the cluster?
    # route:
    #   home:
    #     hostnames: ["ha-mcp.home.mirceanton.com"]
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network-system
