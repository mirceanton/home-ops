---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app alpine
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: demo-b

  path: ./apps/demo-b/alpine/app/
  components:
    - ../../../../components/volsync/
  sourceRef:
    kind: GitRepository
    name: flux-system
  
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 1Gi

  dependsOn:
    - name: external-secrets-operator
      namespace: security-system
    - name: volsync
      namespace: storage-system
