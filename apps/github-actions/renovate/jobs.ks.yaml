---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate-jobs
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: github-actions

  path: ./apps/github-actions/renovate/jobs
  components:
    - ../../../../components/dragonfly/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: renovate
      DRAGONFLY_CPU_REQUEST: 100m
      DRAGONFLY_MEMORY_REQUEST: 256Mi
      DRAGONFLY_MEMORY_LIMIT: 256Mi

  dependsOn:
    - name: renovate-operator
    - name: dragonfly-operator
      namespace: database-system
