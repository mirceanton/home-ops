---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app krr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: krr

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      krr:
        type: cronjob

        cronjob:
          schedule: "0 5 * * *" # Daily at 5:00 AM
          concurrencyPolicy: Replace

        pod:
          restartPolicy: OnFailure

        initContainers:
          krr:
            image:
              repository: ghcr.io/mircea-pavel-anton/krr
              tag: burstable
              pullPolicy: Always
            command:
              - python
              - krr.py
              - burstable
              - --history-duration=720 # 30d in hours
              - --timeframe-duration=1 # step for history data in min.
              - --cpu-min=5 # min millicores to consider
              - --mem-min=8 # min Mi to consider
              - --max-workers=10
              - --allow-hpa
              - --use-oomkill-data
              - --oom-memory-buffer-percentage=15 # if OOMKilled -> add 15% to the memory limit
              - --cpu-requests-percentile=50
              - --cpu-limits-percentile=90
              - --memory-requests-percentile=50
              - --memory-limits-percentile=99
              - --memory-buffer-percentage=15
              - --resource=Deployment
              - --resource=StatefulSet
              - --resource=DaemonSet
              - --formatter=json
              - --fileoutput=/data/krr.json
            env:
              MPLCONFIGDIR: /tmp

            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }

        containers:
          open-issue:
            image:
              repository: python
              tag: 3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
              pullPolicy: IfNotPresent
            command: [python, /scripts/open-issue.py]

            envFrom:
              - secretRef: { name: *app }

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }

    persistence:
      data: { type: emptyDir }
      tmp: { type: emptyDir }
      script:
        type: configMap
        name: krr-script
        advancedMounts:
          krr:
            open-issue:
              - path: /scripts
                readOnly: true

    serviceAccount: { krr: {} }
    rbac:
      roles:
        krr:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: [configmaps, namespaces, pods, replicationcontrollers, services]
              verbs: [get, list, watch]
            - apiGroups: [""]
              resources: [nodes]
              verbs: [get, list, watch]
            - apiGroups: [apps]
              resources: [daemonsets, deployments, deployments/scale, replicasets, replicasets/scale, statefulsets]
              verbs: [get, list, watch]
            - apiGroups: [batch]
              resources: [cronjobs, jobs]
              verbs: [get, list, watch]
            - apiGroups: [autoscaling]
              resources: [horizontalpodautoscalers]
              verbs: [get, list, watch]
      bindings:
        krr:
          type: ClusterRoleBinding
          roleRef: { identifier: krr }
          subjects: [{ identifier: krr }]
