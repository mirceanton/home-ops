---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app krr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: krr

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      krr:
        type: cronjob

        cronjob:
          schedule: "0 0 * * 1"
          concurrencyPolicy: Replace

        pod:
          restartPolicy: OnFailure

        initContainers:
          krr:
            image:
              repository: robustadev/krr
              tag: v1.28.0
              pullPolicy: IfNotPresent
            command:
              - python
              - krr.py
              - simple
              - --allow_hpa
              - --use_oomkill_data
              - --max-workers
              - "3"
              - -f
              - json
              - --fileoutput
              - /data/krr.json
            env:
              MPLCONFIGDIR: /tmp

            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}

        containers:
          open-issue:
            image:
              repository: python
              tag: 3.13-alpine@sha256:420cd0bf0f3998275875e02ecd5808168cf0843cbb4d3c536432f729247b2acc
              pullPolicy: IfNotPresent
            command:
              - python
              - -c
              - |
                import json, os, urllib.request
                from datetime import datetime, timezone

                with open("/data/krr.json") as f:
                    data = json.load(f)

                score = data.get("score", 0)
                letter = "F" if score < 30 else "D" if score < 55 else "C" if score < 70 else "B" if score < 90 else "A"
                today = datetime.now(timezone.utc).strftime("%Y-%m-%d")

                def fmt_cpu(v):
                    if v is None: return "unset"
                    if isinstance(v, str): return "?"
                    return f"{int(v * 1000)}m"

                def fmt_mem(v):
                    if v is None: return "unset"
                    if isinstance(v, str): return "?"
                    mib = v / (1024 * 1024)
                    return f"{mib / 1024:.1f}Gi" if mib >= 1024 else f"{int(mib)}Mi"

                def arrow(cur, rec, fmt):
                    c, r = fmt(cur), fmt(rec["value"] if isinstance(rec, dict) else rec)
                    return c if c == r else f"~~{c}~~ → **{r}**"

                icons = {"CRITICAL": "🔴", "WARNING": "🟡", "OK": "🟢", "GOOD": "💚"}

                actionable = [s for s in data["scans"] if s["severity"] in ("WARNING", "CRITICAL")]
                actionable.sort(key=lambda s: ("WARNING", "CRITICAL").index(s["severity"]) if s["severity"] in ("WARNING", "CRITICAL") else 99, reverse=True)

                lines = [
                    f"## KRR Resource Recommendations — {today}",
                    f"",
                    f"**Cluster score: {score}/100 ({letter})**",
                    f"",
                ]

                if not actionable:
                    lines += ["All workloads are within acceptable resource bounds. No changes needed."]
                else:
                    lines += [
                        f"### {len(actionable)} workload(s) need attention",
                        f"",
                        f"| Severity | Namespace | Workload | Container | CPU req | Mem req | Mem limit |",
                        f"|---|---|---|---|---|---|---|",
                    ]
                    for s in actionable:
                        obj, rec, cur = s["object"], s["recommended"], s["object"]["allocations"]
                        icon = icons.get(s["severity"], "❓")
                        cpu_req = arrow(cur["requests"].get("cpu"), rec["requests"]["cpu"], fmt_cpu)
                        mem_req = arrow(cur["requests"].get("memory"), rec["requests"]["memory"], fmt_mem)
                        mem_lim = arrow(cur["limits"].get("memory"), rec["limits"]["memory"], fmt_mem)
                        lines.append(f"| {icon} {s['severity']} | {obj['namespace']} | {obj['name']} | {obj['container']} | {cpu_req} | {mem_req} | {mem_lim} |")

                unmatched = [s for s in data["scans"] if s["severity"] not in ("OK", "GOOD", "UNKNOWN")]
                # unmatched targets come from the KRR report but aren't in the list above
                # (auto-krr would log these separately; here we just show the full picture)

                body = "\n".join(lines)
                title = f"KRR Dashboard"

                token = os.environ["GH_TOKEN"]
                payload = json.dumps({"title": title, "body": body}).encode()
                req = urllib.request.Request(
                    "https://api.github.com/repos/mirceanton/home-ops/issues",
                    data=payload,
                    headers={
                        "Authorization": f"Bearer {token}",
                        "Accept": "application/vnd.github+json",
                        "Content-Type": "application/json",
                        "X-GitHub-Api-Version": "2022-11-28",
                    },
                    method="POST",
                )
                with urllib.request.urlopen(req) as resp:
                    result = json.loads(resp.read())
                    print(f"Opened: {result['html_url']}")

            envFrom:
              - secretRef:
                  name: *app

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

    persistence:
      data: {type: emptyDir}
      tmp:
        type: emptyDir
        advancedMounts:
          krr:
            krr:
              - path: /tmp

    serviceAccount: {krr: {}}
    rbac:
      roles:
        krr:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - configmaps
                - namespaces
                - pods
                - replicationcontrollers
                - services
              verbs: [get, list, watch]
            - apiGroups: [""]
              resources: [nodes]
              verbs: [get, list, watch]
            - apiGroups: [apps]
              resources:
                - daemonsets
                - deployments
                - deployments/scale
                - replicasets
                - replicasets/scale
                - statefulsets
              verbs: [get, list, watch]
            - apiGroups: [batch]
              resources:
                - cronjobs
                - jobs
              verbs: [get, list, watch]
            - apiGroups: [autoscaling]
              resources: [horizontalpodautoscalers]
              verbs: [get, list, watch]

      bindings:
        krr:
          type: ClusterRoleBinding
          roleRef:
            identifier: krr
          subjects:
            - identifier: krr
