---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crd-schema-publisher
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: jobs

  path: ./apps/jobs/crd-schema-publisher/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  decryption: {provider: sops}
  postBuild:
    substitute: {}

  dependsOn:
    - name: 1password-connect
      namespace: security-system
