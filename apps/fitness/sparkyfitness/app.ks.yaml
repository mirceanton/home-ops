---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sparkyfitness
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: fitness

  path: ./apps/fitness/sparkyfitness/app
  components:
    - ../../../../components/volsync/
    - ../../../../components/cnpg/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      CNPG_RESTORE_BACKUP_KEY: sparkyfitness-20260722-112250.sql.gz
      VOLSYNC_CAPACITY: 5Gi

  dependsOn:
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
    - name: external-secrets-operator
      namespace: security-system
    - name: volsync
      namespace: storage-system
