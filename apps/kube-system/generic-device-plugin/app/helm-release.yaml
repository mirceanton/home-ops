---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: generic-device-plugin
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: generic-device-plugin

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      generic-device-plugin:
        type: daemonset
        containers:
          generic-device-plugin:
            image:
              repository: ghcr.io/squat/generic-device-plugin
              tag: 0.2.0
            args:
              - --config=/config/config.yaml
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

            securityContext:
              # privileged: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      tolerations:
        - operator: Exists
          effect: NoSchedule

    configMaps:
      config:
        data:
          config.yaml: |-
            devices:
              - name: uinput
                groups:
                  - count: 10
                    paths:
                      - path: /dev/uinput
              - name: input
                groups:
                  - count: 10
                    paths:
                      - path: /dev/input
                        mountType: DirectoryOrCreate
              - name: dri-render
                groups:
                  - count: 10
                    paths:
                      - path: /dev/dri/renderD128

    persistence:
      config:
        type: configMap
        name: generic-device-plugin
        globalMounts:
          - path: /config

      dev:
        type: hostPath
        hostPath: /dev
        globalMounts:
          - readOnly: true
      sys:
        type: hostPath
        hostPath: /sys
        globalMounts:
          - readOnly: true
      var-lib-kubelet-device-plugins:
        type: hostPath
        hostPath: /var/lib/kubelet/device-plugins
