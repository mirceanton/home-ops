---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: reloader

  values:
    fullnameOverride: reloader

    reloader:
      enableHA: true
      reloadOnCreate: true
      reloadOnDelete: true
      syncAfterRestart: true

      deployment:
        replicas: 1
        resources:
          requests:
            cpu: 20m
            memory: 128Mi
          limits:
            memory: 256Mi
