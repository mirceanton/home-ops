---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-exporter-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: qbittorrent-exporter-secret
    creationPolicy: Owner

  data:
    - secretKey: QBITTORRENT_USER
      remoteRef:
        key: qBittorrent
        property: username
    - secretKey: QBITTORRENT_PASS
      remoteRef:
        key: qBittorrent
        property: password
