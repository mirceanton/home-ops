---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: lidarr-exporter
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS

  json: |
    {
      "__inputs": [{"name": "DS_PROMETHEUS", "label": "Prometheus", "type": "datasource", "pluginId": "prometheus", "pluginName": "Prometheus"}],
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "barchart", "name": "Bar chart", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""}
      ],
      "description": "Lidarr music library metrics via exportarr",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [

        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [{"options": {"0": {"color": "red", "index": 1, "text": "Offline"}, "1": {"color": "green", "index": 0, "text": "Online"}}, "type": "value"}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 3, "x": 0, "y": 1},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Status",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_system_status", "instant": true, "legendFormat": "Status", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 3}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 3, "x": 3, "y": 1},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Health Issues",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "count(lidarr_system_health_issues) or vector(0)", "instant": true, "legendFormat": "Health Issues", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "blue"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 4, "w": 3, "x": 6, "y": 1},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Total Artists",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_artists_total", "instant": true, "legendFormat": "Artists", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "blue"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 1},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Total Albums",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_albums_total", "instant": true, "legendFormat": "Albums", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "blue"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 4, "w": 3, "x": 12, "y": 1},
          "id": 5,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Total Songs",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_songs_total", "instant": true, "legendFormat": "Songs", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 100}, {"color": "red", "value": 1000}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 3, "x": 15, "y": 1},
          "id": 6,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Missing Songs",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_songs_total - lidarr_songs_downloaded_total", "instant": true, "legendFormat": "Missing", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "text"}, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 7,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Library Size",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_artists_filesize_bytes", "instant": true, "legendFormat": "Size", "refId": "A"}]
        },

        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "id": 102,
          "title": "Queue & History",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 6},
          "id": 20,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Queue",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "sum(lidarr_queue_total)", "instant": true, "legendFormat": "Queue", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "text"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 4, "w": 12, "x": 12, "y": 6},
          "id": 21,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "History",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_history_total", "instant": true, "legendFormat": "History", "refId": "A"}]
        },

        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 10},
          "id": 101,
          "title": "Quality & Genres",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 80, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineWidth": 1},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 11},
          "id": 10,
          "options": {
            "barRadius": 0.2,
            "barWidth": 0.9,
            "groupWidth": 0.9,
            "legend": {"calcs": ["sum"], "displayMode": "table", "placement": "right", "showLegend": true},
            "orientation": "horizontal",
            "showValue": "auto",
            "stacking": "none",
            "tooltip": {"mode": "single", "sort": "none"},
            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 0
          },
          "title": "Songs by Quality",
          "type": "bargauge",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "sort_desc(lidarr_songs_quality_total)", "instant": true, "legendFormat": "{{quality}}", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"fillOpacity": 80, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineWidth": 1},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 16, "w": 24, "x": 0, "y": 19},
          "id": 11,
          "options": {
            "barRadius": 0.3,
            "barWidth": 0.9,
            "groupWidth": 0.9,
            "legend": {"calcs": [], "displayMode": "list", "placement": "right", "showLegend": true},
            "orientation": "horizontal",
            "showValue": "auto",
            "stacking": "none",
            "tooltip": {"mode": "single", "sort": "none"},
            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 0
          },
          "title": "Top 25 Genres by Album Count",
          "type": "bargauge",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "topk(25, lidarr_albums_genres_total)", "instant": true, "legendFormat": "{{genre}}", "refId": "A"}]
        },

        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 35},
          "id": 103,
          "title": "Exporter",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "text"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 36},
          "id": 30,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Total HTTP Requests",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "sum(lidarr_scrape_requests_total)", "instant": true, "legendFormat": "Requests", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": true, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}},
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 18, "x": 6, "y": 36},
          "id": 31,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "rate(lidarr_scrape_requests_total[$__rate_interval])", "legendFormat": "{{code}}", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"color": {"mode": "fixed", "fixedColor": "text"}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 40},
          "id": 32,
          "options": {"colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "title": "Last Scrape Duration",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"}, "expr": "lidarr_scrape_duration_seconds", "instant": true, "legendFormat": "Duration", "refId": "A"}]
        }

      ],
      "refresh": "5m",
      "schemaVersion": 38,
      "tags": ["exportarr", "lidarr", "music"],
      "templating": {"list": []},
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Lidarr",
      "uid": "lidarr-exportarr",
      "version": 1
    }
