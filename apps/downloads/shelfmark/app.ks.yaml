---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app shelfmark
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: downloads

  path: ./apps/downloads/shelfmark/app
  components:
    - ../../../../components/volsync/
    - ../../../../components/nfs-scaler/
    - ../../../../components/oidc/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 64Mi
      VOLSYNC_PUID: "568"
      VOLSYNC_PGID: "568"
      OIDC_CLIENT_ID: arr-apps
      OIDC_OP_ITEM: "Arr Apps - Keycloak"

  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: volsync
      namespace: storage-system
    - name: keda
      namespace: kube-system
