---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app atuin
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: development

  path: ./apps/development/atuin/app
  components:
    - ../../../../components/cnpg/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      CNPG_RESTORE_BACKUP_KEY: atuin-20260722-112249.sql.gz

  decryption: { provider: sops }
  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
    - name: external-secrets-operator
      namespace: security-system
