---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app firefly
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: firefly

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false

    controllers:
      firefly:
        initContainers:
          wait-for-postgres:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DB_URL)"]
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: uri }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

        containers:
          app:
            image:
              repository: fireflyiii/core
              tag: version-6.6.6

            envFrom:
              - secretRef: { name: firefly-keys }
            env:
              TZ: "Europe/Bucharest"
              SEND_TELEMETRY: "false"
              TRUSTED_PROXIES: "**"
              DEFAULT_LANGUAGE: "en_US"
              DEFAULT_LOCALE: "equal"

              SEND_REGISTRATION_MAIL: "false"
              SEND_ERROR_MESSAGE: "false"
              SEND_LOGIN_NEW_IP_WARNING: "false"

              # SSO via Keycloak: Envoy Gateway (see oidc.yaml) does the login
              # and injects the verified email claim into a Remote-User
              # header that Firefly trusts without further checks - native
              # username/password login is disabled as a result.
              AUTHENTICATION_GUARD: "remote_user_guard"
              AUTHENTICATION_GUARD_HEADER: "HTTP_REMOTE_USER"

              LOG_CHANNEL: "stdout"
              AUDIT_LOG_CHANNEL: "stdout"
              APP_LOG_LEVEL: "notice"
              CACHE_DRIVER: "file"
              SESSION_DRIVER: "file"

              DB_CONNECTION: "pgsql"
              DB_HOST:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: host }
              DB_PORT:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: port }
              DB_DATABASE:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: dbname }
              DB_USERNAME:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: username }
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: firefly-postgres-app, key: password }

            probes:
              startup: { enabled: true }
              liveness: { enabled: true }
              readiness: { enabled: true }

            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

      cron:
        type: cronjob
        cronjob:
          schedule: "0 * * * *" # Every hour
          successfulJobsHistory: 1
          failedJobsHistory: 3
          concurrencyPolicy: Forbid

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

        containers:
          cron:
            image:
              repository: curlimages/curl
              tag: 8.21.0
            command:
              - sh
              - -c
              - curl -sS "http://firefly:8080/api/v1/cron/${STATIC_CRON_TOKEN}"

            env:
              STATIC_CRON_TOKEN:
                valueFrom:
                  secretKeyRef: { name: firefly-keys, key: STATIC_CRON_TOKEN }

            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      data-importer:
        containers:
          main:
            image:
              repository: fireflyiii/data-importer
              tag: version-2.3.4

            envFrom:
              - secretRef: { name: firefly-data-importer-token }
            env:
              FIREFLY_III_URL: "http://firefly:8080"
              VANITY_URL: "https://firefly.home.mirceanton.com"
              APP_URL: "https://firefly-importer.home.mirceanton.com"
              TRUSTED_PROXIES: "**"
              LOG_CHANNEL: "stdout"
              FALLBACK_LOCALE: "en_US"

            probes:
              liveness: { enabled: true }
              readiness: { enabled: true }

            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 8Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    service:
      firefly:
        controller: firefly
        ports:
          http:
            port: 8080
      data-importer:
        controller: data-importer
        ports:
          http:
            port: 8080

    route:
      home:
        hostnames: ["firefly.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: firefly
                port: http
      importer:
        hostnames: ["firefly-importer.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: data-importer
                port: http

    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          firefly:
            app:
              - subPath: data
                path: /var/www/html/storage
              - subPath: upload
                path: /var/www/html/storage/upload
          data-importer:
            main:
              - subPath: importer
                path: /var/www/html/storage/uploads
