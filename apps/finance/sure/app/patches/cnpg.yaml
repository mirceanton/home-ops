---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-postgres
spec:
  # TEMPORARY: one-time recovery bootstrap for the default -> finance namespace
  # migration. Once recovery completes and is verified, this must be swapped
  # to `bootstrap: null` permanently (see migrate-cnpg-cluster.md Step 10) —
  # CNPG forbids ever reverting to bootstrap.initdb afterward.
  bootstrap:
    initdb: null
    recovery:
      source: origin
      database: ${APP}
      owner: ${APP}
  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: ${APP}-postgres-backup
          serverName: ${APP}-postgres

  postgresql:
    extensions:
      - name: pgvector
        image:
          # renovate: suite=trixie-pgdg depName=postgresql-18-pgvector
          reference: ghcr.io/cloudnative-pg/pgvector:0.8.1-18-trixie
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: ${APP}
spec:
  extensions:
    - name: vector
