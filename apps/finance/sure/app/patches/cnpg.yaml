---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-postgres
spec:
  # This cluster was bootstrapped via recovery (migrated from the default
  # namespace on 2026-07-13). CNPG's webhook forbids ever switching an
  # already-bootstrapped cluster back to bootstrap.initdb — the component
  # default — so `bootstrap: null` must stay here permanently to suppress
  # it. Confirmed via `kubectl apply --dry-run=server`.
  bootstrap: null
  externalClusters: null
