---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sure
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: finance

  path: ./apps/finance/sure/app
  components:
    - ../../../../components/cnpg/
    - ../../../../components/volsync/
    - ../../../../components/dragonfly/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      CNPG_RESTORE_BACKUP_KEY: sure-20260722-112249.sql.gz
      VOLSYNC_CAPACITY: 2Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"

  decryption: { provider: sops }
  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: volsync
      namespace: storage-system
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
    - name: dragonfly-operator
      namespace: database-system
