---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ipmi-credentials
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: ipmi-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.yml: |
          modules:
            default:
              driver: LAN_2_0
              privilege: user
              timeout: 10000
              user: "{{ .username }}"
              pass: "{{ .password }}"
              collectors:
                - bmc
                - ipmi
                - chassis

  data:
    - secretKey: username
      remoteRef:
        key: "IPMI - metrics"
        property: username
    - secretKey: password
      remoteRef:
        key: "IPMI - metrics"
        property: password
