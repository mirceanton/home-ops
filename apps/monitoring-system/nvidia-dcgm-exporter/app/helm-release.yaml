---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-dcgm-exporter
spec:
  interval: 1h
  chart:
    spec:
      chart: dcgm-exporter
      version: 4.8.1
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter

  values:
    runtimeClassName: nvidia

    nodeSelector:
      nvidia.com/gpu.present: "true"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi

    serviceMonitor:
      enabled: true
