---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: grafana-admin-password-secret
    creationPolicy: Owner

  data:
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: Grafana Admin
        property: password

    - secretKey: AUTH_CLIENT_SECRET
      remoteRef:
        key: Grafana - Keycloak
        property: keycloak_client_secret
