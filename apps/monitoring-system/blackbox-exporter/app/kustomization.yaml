---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./oci-repository.yaml
  - ./helm-release.yaml
  - ./grafana-dashboard.yaml
  - ./probes/

configMapGenerator:
  - name: blackbox-exporter-dashboard
    options:
      disableNameSuffixHash: true
    files:
      - dashboard.json
