---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: blackbox-exporter

  values:
    fullnameOverride: blackbox-exporter

    resources:
      requests:
        cpu: 32m
        memory: 32Mi
      limits:
        memory: 128Mi
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        add: ["NET_RAW"]

    config:
      modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
            follow_redirects: true
            preferred_ip_protocol: ip4

        icmp:
          prober: icmp
          timeout: 5s
          icmp:
            preferred_ip_protocol: ip4

        tcp_connect:
          prober: tcp
          timeout: 5s
          tcp:
            preferred_ip_protocol: ip4

    serviceMonitor:
      enabled: true
      defaults:
        interval: 1m
        scrapeTimeout: 10s

    prometheusRule:
      enabled: true
      rules:
        # WiFi Pi devices — silent notification (intermittent connectivity drops expected)
        - alert: BlackboxProbeFailed
          expr: probe_success{instance=~"mirkdesk-pi\\..*|livingroom-pi\\..*"} == 0
          for: 15m
          labels:
            severity: info
          annotations:
            summary: The host {{ $labels.instance }} is currently unreachable

        # All other targets (HTTP endpoints, NFS, wired devices) — critical as before
        - alert: BlackboxProbeFailed
          expr: probe_success{instance!~"mirkdesk-pi\\..*|livingroom-pi\\..*"} == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: The host {{ $labels.instance }} is currently unreachable
