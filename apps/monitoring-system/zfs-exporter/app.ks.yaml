---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zfs-exporter
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: monitoring-system

  path: ./apps/monitoring-system/zfs-exporter/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute: {}
