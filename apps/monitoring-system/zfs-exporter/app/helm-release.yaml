---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zfs-exporter
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: zfs-exporter

  values:
    controllers:
      zfs-exporter:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          zfs-exporter:
            image:
              repository: ghcr.io/mirceanton/zfs-exporter
              tag: 2.3.12@sha256:ba7c62e3c7f7f19272c85c826085638bbe0d01c21705446d8e41f46ed32806f2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

            #? Needs privileged access to /dev/zfs to query pool/dataset state via libzfs ioctls.
            #? On Talos, ZFS is loaded as a kernel extension so /dev/zfs is available on the host.
            securityContext:
              privileged: true

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0

    service:
      zfs-exporter:
        ports:
          http:
            port: 9134

    serviceMonitor:
      zfs-exporter:
        serviceName: zfs-exporter
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      dev-zfs:
        type: hostPath
        hostPath: /dev/zfs
        globalMounts:
          - path: /dev/zfs
