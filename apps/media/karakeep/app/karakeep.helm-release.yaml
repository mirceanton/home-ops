---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
spec:
  chartRef:
    kind: OCIRepository
    name: karakeep
  interval: 30m
  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      karakeep:
        containers:
          app:
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.32.0
            envFrom:
              - secretRef: { name: karakeep-secret }
            env:
              # TODO: OCR_USE_LLM : https://docs.karakeep.app/configuration/environment-variables/#ocr-configs
              # TODO: LLM AUTO TAGGING: https://docs.karakeep.app/configuration/environment-variables/#inference-configs-for-automatic-tagging
              BROWSER_WEB_URL: http://karakeep-chrome:9222
              CRAWLER_DOWNLOAD_BANNER_IMAGE: true
              CRAWLER_ENABLE_ADBLOCKER: true
              CRAWLER_STORE_SCREENSHOT: true
              CRAWLER_NUM_WORKERS: 4
              DATA_DIR: /data
              DISABLE_SIGNUPS: true
              DISABLE_NEW_RELEASE_CHECK: true
              COREPACK_INTEGRITY_KEYS: 0
              MEILI_ADDR: http://karakeep-meilisearch:7700
              NEXTAUTH_URL: https://karakeep.home.mirceanton.com

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      chrome:
        containers:
          app:
            image:
              repository: gcr.io/zenika-hub/alpine-chrome
              tag: "124"
            command:
              - chromium-browser
            args:
              - --headless
              - --no-sandbox
              - --disable-gpu
              - --disable-dev-shm-usage
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --hide-scrollbars
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

      meilisearch:
        containers:
          app:
            image:
              repository: docker.io/getmeili/meilisearch
              tag: v1.48.0
            args: ["/bin/meilisearch"]
            env:
              MEILI_NO_ANALYTICS: true
              MEILI_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: karakeep-secret
                    key: MEILI_MASTER_KEY
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

    service:
      app:
        controller: karakeep
        ports:
          http: { port: 3000 }
      chrome:
        controller: chrome
        ports:
          http: { port: 9222 }
      meilisearch:
        controller: meilisearch
        ports:
          http: { port: 7700 }

    serviceMonitor:
      app:
        serviceName: karakeep
        selector:
          matchLabels:
            app.kubernetes.io/service: karakeep-app
        endpoints:
          - port: http
            path: /api/metrics
            interval: 30s
            authorization:
              credentials:
                name: karakeep-secret
                key: PROMETHEUS_AUTH_TOKEN

    route:
      home:
        hostnames: ["karakeep.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      data:
        existingClaim: ${APP}
        advancedMounts:
          karakeep:
            app: [{ path: /data }]
      meilisearch-data:
        type: emptyDir
        advancedMounts:
          meilisearch:
            app: [{ path: /meili_data }]
      tmp:
        type: emptyDir
        advancedMounts:
          karakeep:
            app: [{ path: /tmp }]
          meilisearch:
            app: [{ path: /tmp }]
