---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-server
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: immich

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      enableServiceLinks: false

    controllers:
      immich-server:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-postgres:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DB_URL)"]
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: uri
          wait-for-dragonfly:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["redis", "redis://immich-dragonfly:6379"]
          render-config:
            image:
              repository: docker.io/mikefarah/yq
              tag: "4"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                yq -o=yaml '.oauth.clientSecret = env(IMMICH_OAUTH_CLIENT_SECRET)' \
                  /tmp/config.json > /config/config.yaml
            env:
              IMMICH_OAUTH_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: IMMICH_OAUTH_CLIENT_SECRET
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.1
            env:
              TZ: "Europe/Bucharest"
              REDIS_HOSTNAME: immich-dragonfly
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              IMMICH_TELEMETRY_INCLUDE: all
              IMMICH_CONFIG_FILE: /config/config.yaml
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: uri

            resources:
              requests:
                cpu: 13m
                memory: 650Mi
              limits:
                memory: 8Gi

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: &port 2283
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: *port
                  periodSeconds: 10
                  failureThreshold: 30

    service:
      app:
        ports:
          http:
            port: *port
          metrics-api:
            port: 8081
          metrics-ms:
            port: 8082

    route:
      home:
        hostnames: ["photos.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /data

      config-template:
        type: configMap
        name: immich-config-template
        defaultMode: 0444
        globalMounts:
          - path: /tmp/config.json
            subPath: config.json

      config:
        type: emptyDir
        globalMounts:
          - path: /config
