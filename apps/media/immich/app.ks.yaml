---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: media

  path: ./apps/media/immich/app
  components:
    - ../../../../components/cnpg/
    - ../../../../components/volsync/
    - ../../../../components/dragonfly/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 100Gi
      CNPG_DATA_STORAGE_SIZE: 8Gi
      CNPG_CPU_REQUEST: 1000m
      CNPG_MEMORY_REQUEST: 4Gi
      CNPG_MEMORY_LIMIT: 4Gi
      DRAGONFLY_CPU_REQUEST: 18m
      DRAGONFLY_MEMORY_REQUEST: 32Mi
      DRAGONFLY_MEMORY_LIMIT: 64Mi
      DRAGONFLY_PROACTOR_THREADS: "2"

  dependsOn:
    - name: dragonfly-operator
      namespace: database-system
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
