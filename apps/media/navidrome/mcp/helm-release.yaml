---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome-mcp
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: navidrome-mcp

  values:
    fullnameOverride: navidrome-mcp
    global:
      createDefaultServiceAccount: false

    controllers:
      navidrome-mcp:
        containers:
          navidrome-mcp:
            image:
              repository: ghcr.io/mirceanton/navidrome-mcp
              tag: 2.1.0
            env:
              NAVIDROME_CONFIG_PATH: /config/settings.json

            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 4Gi

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      navidrome-mcp:
        ports:
          http:
            port: 3000

    persistence:
      config:
        type: secret
        name: navidrome-mcp-secret
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
