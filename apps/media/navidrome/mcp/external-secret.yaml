---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name navidrome-mcp-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        settings.json: |
          {
            "navidrome": {
              "url": "http://navidrome:4533",
              "username": {{ .NAVIDROME_USERNAME | toJson }},
              "password": {{ .NAVIDROME_PASSWORD | toJson }}
            },
            "library": {
              "defaultLibraryIds": [],
              "filterCacheEnabled": true
            },
            "features": {
              "lastFmApiKey": null,
              "radioBrowserBase": null,
              "lyricsProvider": "lrclib",
              "lrclibUserAgent": "Navidrome-MCP",
              "lrclibBase": "https://lrclib.net"
            },
            "playback": {
              "mpvPath": null
            },
            "webui": {
              "enabled": false
            },
            "advanced": {
              "debug": false,
              "cacheTtl": 300,
              "tokenExpiry": 86400
            }
          }
  data:
    - secretKey: NAVIDROME_USERNAME
      remoteRef:
        key: Navidrome MCP
        property: userName
    - secretKey: NAVIDROME_PASSWORD
      remoteRef:
        key: Navidrome MCP
        property: password
