---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: papra-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: papra-secret
    creationPolicy: Owner

  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: Papra
        property: AUTH_SECRET
