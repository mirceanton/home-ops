---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name paperless-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: *name
    creationPolicy: Owner

  data:
    - secretKey: PAPERLESS_ADMIN_USER
      remoteRef:
        key: Paperless-NGX
        property: username

    - secretKey: PAPERLESS_ADMIN_PASSWORD
      remoteRef:
        key: Paperless-NGX
        property: password

    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: Paperless-NGX
        property: secret_key
