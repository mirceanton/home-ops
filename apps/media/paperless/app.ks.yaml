---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: media

  path: ./apps/media/paperless/app
  components:
    - ../../../../components/cnpg/
    - ../../../../components/volsync/
    - ../../../../components/dragonfly/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substituteFrom:
      - kind: Secret
        name: paperless-cnpg-backup
        optional: true
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 50Gi
      CNPG_DATA_STORAGE_SIZE: 8Gi

  decryption: { provider: sops }
  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: volsync
      namespace: storage-system
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
    - name: dragonfly-operator
      namespace: database-system
