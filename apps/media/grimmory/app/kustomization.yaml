---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./grimmory.oci-repository.yaml
  - ./grimmory.helm-release.yaml
  - ./grimmory.secret.sops.yaml

  - ./mariadb.oci-repository.yaml
  - ./mariadb.helm-release.yaml
  - ./mariadb-backup.cronjob.yaml
  - ./mariadb-restore.cronjob.yaml

configMapGenerator:
  - name: grimmory-mariadb-scripts
    files:
      - backup.sh=../../../../.scripts/mariadb/backup.sh
      - restore.sh=../../../../.scripts/mariadb/restore.sh

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
