---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name grimmory-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: *name
    creationPolicy: Owner

  data:
    - secretKey: mariadb_password
      remoteRef:
        key: Grimmory
        property: mariadb_password
    - secretKey: mariadb_root_password
      remoteRef:
        key: Grimmory
        property: mariadb_root_password
