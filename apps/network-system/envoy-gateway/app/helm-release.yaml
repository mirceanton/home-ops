---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: envoy-gateway

  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

  values:
    deployment:
      replicas: 1
      envoyGateway:
        resources:
          requests:
            cpu: 20m
            memory: 256Mi
          limits:
            memory: 512Mi

    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
