---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-internal
spec:
  logging:
    level:
      default: info

  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 1
        container:
          imageRepository: mirror.gcr.io/envoyproxy/envoy
          resources:
            requests:
              cpu: 15m
              memory: 137Mi
            limits:
              memory: 137Mi
      envoyService:
        externalTrafficPolicy: Local

  shutdown:
    drainTimeout: 180s
