---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vikunja
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: vikunja

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      vikunja:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          wait-for-postgres:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DB_URL)"]
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: vikunja-postgres-app
                    key: uri

        containers:
          app:
            image:
              repository: vikunja/vikunja
              tag: 2.4.0

            envFrom:
              - secretRef: { name: vikunja-secret }
            env:
              VIKUNJA_SERVICE_PUBLICURL: "https://tasks.home.mirceanton.com"
              VIKUNJA_SERVICE_TIMEZONE: "Europe/Bucharest"
              VIKUNJA_AUTH_LOCAL_ENABLED: "false"
              VIKUNJA_AUTH_OPENID_ENABLED: "true"
              VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_NAME: "Keycloak"
              VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_AUTHURL: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab"
              VIKUNJA_AUTH_OPENID_PROVIDERS_KEYCLOAK_CLIENTID: "vikunja"

              VIKUNJA_DATABASE_TYPE: postgres
              VIKUNJA_DATABASE_HOST:
                valueFrom:
                  secretKeyRef: { name: vikunja-postgres-app, key: host }
              VIKUNJA_DATABASE_PORT:
                valueFrom:
                  secretKeyRef: { name: vikunja-postgres-app, key: port }
              VIKUNJA_DATABASE_DATABASE:
                valueFrom:
                  secretKeyRef: { name: vikunja-postgres-app, key: dbname }
              VIKUNJA_DATABASE_USER:
                valueFrom:
                  secretKeyRef: { name: vikunja-postgres-app, key: username }
              VIKUNJA_DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef: { name: vikunja-postgres-app, key: password }

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/info
                    port: &port 3456
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/info
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      app:
        controller: vikunja
        ports:
          http:
            port: *port

    route:
      home:
        hostnames: ["tasks.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /app/vikunja/files
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
