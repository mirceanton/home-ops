---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bambuddy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bambuddy

  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      bambuddy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4.7
            env:
              PORT: &httpPort 8000
              SLICER_API_URL: http://bambuddy-slicer:3000

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 4Gi

            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add: [NET_BIND_SERVICE]
                drop: [ALL]

      slicer:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/mirceanton/bambu-studio-api
              tag: 02.06.00.51
            env:
              PORT: &slicerPort 3000
              NODE_ENV: production
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    service:
      app:
        controller: bambuddy
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *httpPort

      slicer:
        controller: slicer
        ports:
          http:
            port: *slicerPort

    serviceMonitor:
      app:
        serviceName: bambuddy-app
        endpoints:
          - port: http
            scheme: http
            path: /api/v1/metrics
            interval: 30s
            scrapeTimeout: 15s

    route:
      home:
        hostnames: [bambuddy.home.mirceanton.com]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          bambuddy:
            app:
              - path: /app/data
                subPath: data
          slicer:
            app:
              - path: /app/data
                subPath: bambu-studio-data

      tmpfs:
        type: emptyDir
        advancedMounts:
          bambuddy:
            app:
              - path: /tmp
                subPath: tmp
              - path: /app/logs
                subPath: logs
          slicer:
            app:
              - path: /tmp
                subPath: slicer-tmp
