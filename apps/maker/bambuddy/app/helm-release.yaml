---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bambuddy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bambuddy

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      bambuddy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4.9
            env:
              PORT: &httpPort 8000
              HA_URL: http://home-assistant.home-automation.svc.cluster.local:8123
              HA_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: bambuddy-secret
                    key: HA_TOKEN

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 4Gi

            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add: [NET_BIND_SERVICE]
                drop: [ALL]

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *httpPort

    serviceMonitor:
      app:
        serviceName: bambuddy-app
        endpoints:
          - port: http
            scheme: http
            path: /api/v1/metrics
            interval: 30s
            scrapeTimeout: 15s

    route:
      home:
        hostnames: [bambuddy.home.mirceanton.com]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          bambuddy:
            app:
              - path: /app/data
                subPath: data

      tmpfs:
        type: emptyDir
        advancedMounts:
          bambuddy:
            app:
              - path: /tmp
                subPath: tmp
              - path: /app/logs
                subPath: logs
