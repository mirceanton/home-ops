---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./oci-repository.yaml
  - ./helm-release.yaml
  - ./grafana-dashboard.yaml
  - ./external-secret.yaml

configMapGenerator:
  - name: bambuddy-dashboard
    options:
      disableNameSuffixHash: true
    files:
      - dashboard.json
