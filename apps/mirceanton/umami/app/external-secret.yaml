---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-keys
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: umami-keys
    creationPolicy: Owner

  data:
    - secretKey: APP_SECRET
      remoteRef:
        key: Umami Keys
        property: APP_SECRET
