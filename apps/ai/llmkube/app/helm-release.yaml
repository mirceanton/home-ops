---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: llmkube

  values:
    namespace: ai
    crds:
      install: true
      keep: true

    controllerManager:
      image:
        repository: ghcr.io/mirceanton/forks/llmkube/llmkube-controller
        tag: scale-subresource2
      replicaCount: 1
      leaderElection: {enabled: true}
      resources:
        requests:
          cpu: 10m
          memory: 83Mi
        limits:
          memory: 83Mi

      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    metrics:
      enabled: true
      secure: true
      service:
        type: ClusterIP
        port: 8443

    prometheus:
      serviceMonitor:
        enabled: true
        interval: 30s
      inferencePodMonitor:
        enabled: true
        interval: 30s
      prometheusRule:
        enabled: false

    modelCache:
      enabled: true
      size: 200Gi
      storageClass: openebs-zfs-cache
      accessMode: ReadWriteOnce
      mountPath: /models
      annotations: {}
