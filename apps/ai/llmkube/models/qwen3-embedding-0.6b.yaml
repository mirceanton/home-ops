---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0.6b
spec:
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      resourceName: devic.es/dri-render

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0.6b
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-embedding-0.6b
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  replicas: 1
  priority: batch
  parallelSlots: 2 # up to 2 concurrent sessions

  flashAttention: true
  contextSize: 32768
  uBatchSize: 2048
  extraArgs:
    - "--embeddings"

  resources:
    cpu: 500m
    memory: 1Gi
    gpu: 1
    gpuMemory: 3Gi

  endpoint:
    port: 8080
    type: ClusterIP
