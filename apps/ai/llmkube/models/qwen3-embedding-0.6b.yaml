---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0.6b
spec:
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      vendor: nvidia
      layers: -1

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0.6b
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-embedding-0.6b
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  replicas: 1
  priority: batch
  runtimeClassName: nvidia
  parallelSlots: 4

  flashAttention: true
  contextSize: 32768
  uBatchSize: 2048
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  extraArgs:
    - "--embeddings"
    - "--no-mmap"

  resources:
    cpu: "10m"
    memory: 2Gi
    gpu: 1
    gpuMemory: 3Gi

  endpoint:
    port: 8080
    type: ClusterIP
