---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen-35b
spec:
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
  format: gguf
  quantization: Q4_K_M
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      vendor: nvidia
      layers: -1

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-35b
spec:
  modelRef: qwen-35b
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  replicas: 0
  priority: batch
  runtimeClassName: nvidia
  parallelSlots: 1

  flashAttention: true
  contextSize: 262144
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  moeCPUOffload: true
  extraArgs:
    - "--no-mmap"

  resources:
    cpu: "10m"
    memory: 2Gi
    gpu: 1
    gpuMemory: 12Gi

  endpoint:
    port: 8080
    type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: qwen-35b-proxy
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.kube-system.svc.cluster.local
  ports: [{ port: 8080 }]

---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: qwen-35b
spec:
  hosts: ["qwen-35b-proxy.ai.svc.cluster.local"]
  replicas: { min: 0, max: 1 }
  scaledownPeriod: 600
  scaleTargetRef:
    apiVersion: inference.llmkube.dev/v1alpha1
    kind: InferenceService
    name: qwen-35b
    service: qwen-35b
    port: 8080
