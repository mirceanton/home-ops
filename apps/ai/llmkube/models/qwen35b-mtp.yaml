---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen35b-mtp
spec:
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
  format: gguf
  quantization: UD-Q4_K_M
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      resourceName: devic.es/dri-render

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen35b-mtp
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen35b-mtp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  replicas: 1
  priority: batch
  parallelSlots: 1 # single concurrent session

  flashAttention: true
  contextSize: 131072
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  extraArgs:
    - "--spec-type"
    - "draft-mtp"
    - "--spec-draft-n-max"
    - "2"

  resources:
    cpu: 500m # just for scheduling purposes...
    memory: 1Gi # just for scheduling purposes...
    gpu: 1
    gpuMemory: 24Gi

  endpoint:
    port: 8080
    type: ClusterIP
