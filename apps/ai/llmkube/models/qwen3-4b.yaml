---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-4b
spec:
  source: https://huggingface.co/unsloth/Qwen3-4B-GGUF/resolve/main/Qwen3-4B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: UD-Q4_K_XL
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      count: 1
      vendor: amd
      runtime: vulkan
      layers: -1
      resourceName: devic.es/dri-render

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-4b
  labels:
    krr/ignore: "true"
spec:
  modelRef: qwen3-4b
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  replicas: 1
  priority: batch
  parallelSlots: 1 # single concurrent session

  flashAttention: true
  contextSize: 32768
  uBatchSize: 512
  cacheTypeK: q8_0
  cacheTypeV: q8_0

  resources:
    cpu: 500m # just for scheduling purposes...
    memory: 6Gi
    gpu: 1
    gpuMemory: 6Gi

  endpoint:
    port: 8080
    type: ClusterIP
