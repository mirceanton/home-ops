---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma-4
spec:
  source: https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-UD-Q6_K_XL.gguf
  format: gguf
  quantization: Q6_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      vendor: nvidia
      layers: -1

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma-4
spec:
  modelRef: gemma-4
  replicas: 0
  runtimeClassName: nvidia
  parallelSlots: 1
  contextSize: 32768
  uBatchSize: 512
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  resources:
    cpu: "10m"
    memory: 16Gi
    gpu: 1
    gpuMemory: 10Gi
  endpoint:
    port: 8080
    type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: gemma-4-proxy
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.kube-system.svc.cluster.local
  ports:
    - port: 8080

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gemma-4
spec:
  scaleTargetRef:
    apiVersion: inference.llmkube.dev/v1alpha1
    kind: InferenceService
    name: gemma-4
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 1800
  triggers:
    - type: external
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.kube-system.svc.cluster.local:9090
        host: gemma-4-proxy.ai.svc.cluster.local
        targetPendingRequests: "1"
