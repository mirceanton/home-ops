---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma-4
spec:
  source: https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-UD-Q6_K_XL.gguf
  format: gguf
  quantization: Q6_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      vendor: nvidia
      layers: -1

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma-4
spec:
  modelRef: gemma-4
  replicas: 0
  runtimeClassName: nvidia
  parallelSlots: 1
  contextSize: 32768
  uBatchSize: 512
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  resources:
    cpu: "10m"
    memory: 16Gi
    gpu: 1
    gpuMemory: 10Gi
  endpoint:
    port: 8080
    type: ClusterIP

