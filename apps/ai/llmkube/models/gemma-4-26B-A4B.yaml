---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: gemma-4-26b-a4b
spec:
  source: https://huggingface.co/unsloth/gemma-4-26B-A4B-it-qat-GGUF/resolve/main/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
  format: gguf
  quantization: Q4_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      count: 1
      vendor: nvidia
      layers: -1

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma-4-26b-a4b
spec:
  modelRef: gemma-4-26b-a4b
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  replicas: 0
  priority: batch
  runtimeClassName: nvidia
  parallelSlots: 1

  flashAttention: true
  contextSize: 262144
  uBatchSize: 1024
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  moeCPUOffload: true
  extraArgs:
    - "--no-mmap"

  resources:
    cpu: "10m"
    memory: 2Gi
    gpu: 1
    gpuMemory: 12Gi

  endpoint:
    port: 8080
    type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: gemma-4-26b-a4b-proxy
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.kube-system.svc.cluster.local
  ports: [{ port: 8080 }]

---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: gemma-4-26b-a4b
spec:
  hosts: ["gemma-4-26b-a4b-proxy.ai.svc.cluster.local"]
  replicas: { min: 0, max: 1 }
  scaledownPeriod: 600
  scaleTargetRef:
    apiVersion: inference.llmkube.dev/v1alpha1
    kind: InferenceService
    name: gemma-4-26b-a4b
    service: gemma-4-26b-a4b
    port: 8080
