---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app whisper
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: ai

  path: ./apps/ai/whisper/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute: {}

  dependsOn:
    - name: nvidia-device-plugin
      namespace: kube-system
