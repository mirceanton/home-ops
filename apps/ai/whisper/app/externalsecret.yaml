---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: huggingface-token
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: huggingface-token
    creationPolicy: Owner

  data:
    - secretKey: HF_TOKEN
      remoteRef:
        key: Huggingface Token
        property: password
