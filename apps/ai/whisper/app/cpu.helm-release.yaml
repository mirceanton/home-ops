---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app whisper-cpu
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: whisper

  values:
    controllers:
      whisper-cpu:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: onerahmet/openai-whisper-asr-webservice
              tag: v1.9.1
            env:
              # https://ahmetoner.com/whisper-asr-webservice/
              TZ: Europe/Bucharest
              ASR_MODEL: large # tiny, base, small, medium, large, large-v2, large-v3
              ASR_ENGINE: faster_whisper # faster_whisper, openai_whisper, whisperx
              MODEL_IDLE_TIMEOUT: 60 # seconds to keep the model loaded after last request, set to 0 to disable unloading
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: huggingface-token
                    key: HF_TOKEN
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: &port 9000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              readiness: *probe
              startup: *probe

            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 8Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: whisper-cpu
        ports:
          http:
            port: *port

    route:
      home:
        hostnames: ["whisper-cpu.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      cache:
        existingClaim: whisper-cache
        globalMounts:
          - path: /root/.cache/
            subPath: cache
          - path: /root/.config
            subPath: config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
