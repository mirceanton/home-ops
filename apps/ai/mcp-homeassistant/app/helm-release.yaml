---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-homeassistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: mcp-homeassistant

  values:
    controllers:
      mcp-homeassistant:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/homeassistant-ai/ha-mcp
              tag: 7.1.0@sha256:e5f0c92b7b4d49d87382354a9e8c28ab9df5692c384a5a0f8b2bdfb32ac5678e
            # ha-mcp-sse always passes stateless_http=True which FastMCP 3.x rejects for SSE.
            # Workaround: call run_async directly without that flag.
            command:
              - /app/.venv/bin/python3
              - -c
              - |
                from ha_mcp.__main__ import _setup_standard_mode,_get_http_runtime,_run_entrypoint,_run_with_shutdown,_get_mcp,_get_show_banner,_get_timestamped_uvicorn_log_config
                _setup_standard_mode()
                port,path=_get_http_runtime(8087)
                async def run():
                    await _run_with_shutdown(_get_mcp().run_async(transport='sse',host='0.0.0.0',port=port,path=path,show_banner=_get_show_banner(),uvicorn_config={'log_config':_get_timestamped_uvicorn_log_config()}))
                _run_entrypoint(run(),'SSE server')
            env:
              TZ: Europe/Bucharest
              MCP_PORT: "8086"
              MCP_SECRET_PATH: /sse
              HOMEASSISTANT_URL: http://home-assistant.home-automation.svc.cluster.local:8123
              HOMEASSISTANT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: mcp-homeassistant-secret
                    key: HOMEASSISTANT_TOKEN
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: mcp-homeassistant
        ports:
          http:
            port: 8086

    #? do i even need to expose this outside the cluster?
