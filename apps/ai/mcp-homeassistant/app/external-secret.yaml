---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-homeassistant-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: mcp-homeassistant-secret
    creationPolicy: Owner

  data:
    - secretKey: HOMEASSISTANT_TOKEN
      remoteRef:
        key: Home Assistant MCP
        property: token
