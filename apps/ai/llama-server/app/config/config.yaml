---
# seconds; upper bound for a cold load (large MoE mmap warmup + first-token
# page-fault round-trips from PVC). Default 120s is too tight for MoE models.
healthCheckTimeout: 900

macros:
  common: >
    --host 127.0.0.1
    --jinja
    --cache-type-k q8_0 --cache-type-v q8_0
    --temp 0.2 --top-k 20
    --metrics
    --verbose

models:
  qwen-3.6:
    ttl: 3600
    aliases:
      - qwen3.6-35b-a3b
      - claude-sonnet-4-5
      - claude-sonnet-4-5-20250929
      - claude-haiku-4-5
      - claude-haiku-4-5-20251001
      - claude-opus-4-5
      - claude-opus-4-5-20251101
    cmd: >
      /app/llama-server
      --port ${PORT}
      ${common}
      --hf-repo unsloth/Qwen3.6-35B-A3B-GGUF
      --hf-file Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      --ctx-size 32768
      --n-predict -1
      --parallel 1
      --n-gpu-layers 50
      --n-cpu-moe 25
      -rtr
      --ubatch-size 1024
      --threads 10
      --threads-batch 10
      --slot-save-path /cache/slots
      --top-p 0.95
      --chat-template-file /templates/chat-template-claude.jinja
