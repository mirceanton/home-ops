---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: llama-server

  values:
    defaultPodOptions:
      runtimeClassName: nvidia

    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/ikawrakow/ik-llama-cpp
              tag: cu12-swap-4417@sha256:e747df1b266ea2a36d4763d7d84abe9ce0f919c941827140626e20e093880066
            command: ["/app/llama-swap"]
            args: ["-config", "/app/config.yaml", "-listen", "0.0.0.0:8080"]

            env:
              TZ: Europe/Bucharest
              HF_HOME: /cache
              LLAMA_CACHE: /cache

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
                nvidia.com/gpu: 1
              limits:
                memory: 32Gi
                nvidia.com/gpu: 1

            probes:
              #? llama-swap starts in < 5 s; no model load at pod start.
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3

    service:
      app:
        ports:
          http: {port: *port}
    route:
      home:
        hostnames: ["llama.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /upstream/qwen-3.6/metrics
            interval: 1m
            scrapeTimeout: 10s

    persistence:
      config:
        type: configMap
        name: llama-server-config
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      cache:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 200Gi
        storageClass: openebs-zfs-cache
        globalMounts:
          - path: /cache
