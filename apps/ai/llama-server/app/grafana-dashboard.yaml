---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: llama-server
spec:
  folderRef: ai
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS

  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "llama.cpp inference metrics.",
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 100,
          "panels": [],
          "title": "Throughput",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Current prompt-processing (prefill) speed reported by llama.cpp. Gauge value from the most recent completed request.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              },
              "unit": "short",
              "decimals": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 7 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:prompt_tokens_seconds",
              "legendFormat": "Prompt tokens/second",
              "refId": "A"
            }
          ],
          "title": "Prompt (prefill) tokens/second",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Current decode (generation) speed. Gauge value from the most recent completed request.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short",
              "decimals": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 7 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:predicted_tokens_seconds",
              "legendFormat": "Decode tokens/second",
              "refId": "A"
            }
          ],
          "title": "Decode tokens/second",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Active request slots in llama.cpp. `processing` = currently decoding; `deferred` = queued because all parallel slots are busy.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              },
              "unit": "none"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Deferred" },
                "properties": [
                  {
                    "id": "color",
                    "value": { "fixedColor": "red", "mode": "fixed" }
                  }
                ]
              }
            ]
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 7 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:requests_processing",
              "legendFormat": "Processing",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:requests_deferred",
              "legendFormat": "Deferred",
              "refId": "B"
            }
          ],
          "title": "Active / deferred requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "KV cache fill ratio. Climbing towards 1.0 means prompts are near the --ctx-size limit and llama.cpp will soon evict or refuse.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.75 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "unit": "percentunit",
              "decimals": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 7 },
          "id": 4,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:kv_cache_usage_ratio",
              "refId": "A"
            }
          ],
          "title": "KV cache usage",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Prompt (prefill) and decode speed over time, from the most recent completed request.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "tokens/s",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 13 },
          "id": 5,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:prompt_tokens_seconds",
              "legendFormat": "Prompt tokens/second (gauge)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:predicted_tokens_seconds",
              "legendFormat": "Decode tokens/second (gauge)",
              "refId": "B"
            }
          ],
          "title": "Throughput over time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 101,
          "panels": [],
          "title": "KV cache & queue",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "KV cache fill ratio over time.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 1,
              "min": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.75 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 6,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:kv_cache_usage_ratio",
              "legendFormat": "KV cache usage",
              "refId": "A"
            }
          ],
          "title": "KV cache usage",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Absolute KV cache tokens occupied across all parallel slots.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "never",
                "spanNulls": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 7,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:kv_cache_tokens",
              "legendFormat": "KV cache tokens",
              "refId": "A"
            }
          ],
          "title": "KV cache tokens",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Processing and deferred request counts over time. Deferred > 0 sustained means you need more --parallel slots or callers are too bursty.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 30,
                "gradientMode": "opacity",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 32 },
          "id": 8,
          "options": {
            "legend": {
              "calcs": ["mean", "max"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:requests_processing",
              "legendFormat": "processing",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:requests_deferred",
              "legendFormat": "deferred",
              "refId": "B"
            }
          ],
          "title": "Request slots over time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
          "id": 102,
          "panels": [],
          "title": "Cumulative token totals",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Total tokens llama.cpp has ingested (prompt) and emitted (predicted) since the process started. Counters reset on pod restart.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 41 },
          "id": 9,
          "options": {
            "legend": {
              "calcs": ["last"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:prompt_tokens_total",
              "legendFormat": "prompt tokens",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "llamacpp:tokens_predicted_total",
              "legendFormat": "predicted tokens",
              "refId": "B"
            }
          ],
          "title": "Cumulative tokens",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 49 },
          "id": 103,
          "panels": [],
          "title": "GPU",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Current GPU compute utilization.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 5, "x": 0, "y": 0 },
          "id": 20,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "max(DCGM_FI_DEV_GPU_UTIL)",
              "legendFormat": "GPU util",
              "refId": "A"
            }
          ],
          "title": "GPU utilization",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Current GPU core temperature.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 5, "x": 5, "y": 0 },
          "id": 21,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "max(DCGM_FI_DEV_GPU_TEMP)",
              "legendFormat": "temp",
              "refId": "A"
            }
          ],
          "title": "GPU temperature",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "VRAM fill percentage (used / used+free+reserved).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent",
              "decimals": 1
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 4, "x": 10, "y": 0 },
          "id": 22,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "100 * max(DCGM_FI_DEV_FB_USED) / (max(DCGM_FI_DEV_FB_USED) + max(DCGM_FI_DEV_FB_FREE) + max(DCGM_FI_DEV_FB_RESERVED))",
              "legendFormat": "VRAM %",
              "refId": "A"
            }
          ],
          "title": "VRAM usage",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "CPU usage by the llama-server pod in millicores (1m rate).",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 5, "x": 14, "y": 0 },
          "id": 23,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"ai\", pod=~\"llama-server-.*\", container=\"app\"}[1m])) * 1000",
              "legendFormat": "millicores",
              "refId": "A"
            }
          ],
          "title": "Pod CPU",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "Working set memory used by the llama-server pod.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "purple", "value": null }]
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 5, "x": 19, "y": 0 },
          "id": 24,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"ai\", pod=~\"llama-server-.*\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "memory",
              "refId": "A"
            }
          ],
          "title": "Pod memory",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "description": "GPU utilization over time.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "max": 100,
              "min": 0,
              "mappings": [],
