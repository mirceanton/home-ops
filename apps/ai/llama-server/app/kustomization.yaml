kind: Kustomization

resources:
  - ./helm-release.yaml
  - ./oci-repository.yaml
  - ./grafana-dashboard.yaml

configMapGenerator:
  - name: llama-server-config
    options:
      disableNameSuffixHash: true
    files:
      # - config.yaml=./config/qwen-3.6-35b-a3b.yaml
      - config.yaml=./config/gemma-4-e4b.yaml
      - chat-template-claude.jinja=./templates/claude.jinja
