---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./helm-release.yaml
  - ./oci-repository.yaml
  - ./grafana-dashboard.yaml

configMapGenerator:
  - name: llama-server-config
    options:
      disableNameSuffixHash: true
    files:
      - config.yaml=./config/config.yaml
      - chat-template-claude.jinja=./config/chat-template-claude.jinja
