---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mcp-flux
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 5m
  targetNamespace: ai

  path: ./apps/ai/mcp-flux/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app

  dependsOn: []
