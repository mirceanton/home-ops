---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: litellm

  values:
    global: { createDefaultServiceAccount: false }

    controllers:
      litellm:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          wait-for-pg:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DATABASE_URL)"]
            env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri

        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: 1.92.0
            args: ["--config", "/config/config.yaml", "--port", "4000"]
            env:
              LITELLM_MODE: PRODUCTION
              LITELLM_LOG: INFO
              LITELLM_LOCAL_MODEL_COST_MAP: "False"
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: master-key
              LITELLM_SALT_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: salt-key

              STORE_MODEL_IN_DB: "True"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri

              GITHUB_MCP_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: GITHUB_MCP_TOKEN

              FIREFLY_MCP_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: FIREFLY_MCP_TOKEN

            resources:
              requests:
                cpu: 10m
                memory: 1.1Gi
              limits:
                memory: 2Gi

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        # litellm cannot run as non-root: the Prisma CLI is pre-cached at
        # /root/.cache/prisma-python/ in the image. Running as uid=568 forces
        # a fresh nodeenv download that fails (libatomic.so.1 missing in image).
        # runAsNonRoot: true
        # runAsUser: 568
        # runAsGroup: 568
        # fsGroup: 568
        # fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: litellm
        ports:
          http: { port: 4000 }

    route:
      home:
        hostnames: ["llm.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    serviceMonitor:
      app:
        serviceName: litellm
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
