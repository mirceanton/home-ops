---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: litellm

  values:
    global: { createDefaultServiceAccount: false }

    controllers:
      litellm:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          wait-for-pg:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DATABASE_URL)"]
            env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri

        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.93.0
            args: ["--config", "/config/config.yaml", "--port", "4000"]
            env:
              LITELLM_MODE: PRODUCTION
              LITELLM_LOG: INFO
              LITELLM_LOCAL_MODEL_COST_MAP: "False"
              STORE_MODEL_IN_DB: "True"
              PROXY_BASE_URL: "https://llm.home.mirceanton.com"
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: master-key
              LITELLM_SALT_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: salt-key
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri
              GITHUB_MCP_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: GITHUB_MCP_TOKEN
              FIREFLY_MCP_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: FIREFLY_MCP_TOKEN
              QWEN_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: QWEN_KEY

              # SSO Configuration (Generic OIDC / Keycloak)
              GENERIC_CLIENT_ID: "litellm"
              GENERIC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: OIDC_CLIENT_SECRET
              GENERIC_AUTHORIZATION_ENDPOINT: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab/protocol/openid-connect/auth"
              GENERIC_TOKEN_ENDPOINT: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab/protocol/openid-connect/token"
              GENERIC_USERINFO_ENDPOINT: "https://keycloak.nas.svc.h.mirceanton.com/realms/Homelab/protocol/openid-connect/userinfo"
              GENERIC_SCOPE: "openid profile email"
              AUTO_REDIRECT_UI_LOGIN_TO_SSO: "true"
              PROXY_ADMIN_ID: "mirk" #? admin user for oidc login

            resources:
              requests:
                cpu: 10m
                memory: 1.1Gi
              limits:
                memory: 2Gi

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: litellm
        ports:
          http: { port: 4000 }

    route:
      home:
        hostnames: ["llm.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    serviceMonitor:
      app:
        serviceName: litellm
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s

    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
