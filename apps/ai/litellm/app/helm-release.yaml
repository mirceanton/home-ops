---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: litellm

  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-postgres:
            image:
              repository: wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DATABASE_URL)"]
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: main-stable
            args: ["--config", "/config/config.yaml", "--port", "4000"]
            env:
              LITELLM_MODE: PRODUCTION
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-postgres-app
                    key: uri
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: LITELLM_MASTER_KEY
              LITELLM_SALT_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: LITELLM_SALT_KEY

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: &port 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probe

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: litellm
        ports:
          http:
            port: *port

    route:
      home:
        hostnames: ["litellm.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system

    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
