---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm-secret
spec:
  refreshInterval: 55m

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: *name
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        master-key: '{{ index . "master-key" }}'
        salt-key: '{{ index . "salt-key" }}'
        GITHUB_MCP_TOKEN: "{{ .token }}"
        QWEN_KEY: "{{ .QWEN_KEY }}"
        OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"

  data:
    - secretKey: master-key
      remoteRef:
        key: LiteLLM
        property: LITELLM_MASTER_KEY

    - secretKey: salt-key
      remoteRef:
        key: LiteLLM
        property: LITELLM_SALT_KEY

    - secretKey: QWEN_KEY
      remoteRef:
        key: LiteLLM
        property: QWEN_KEY
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: LiteLLM - Keycloak
        property: keycloak_client_secret

  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: mr-borboto-auth-token
