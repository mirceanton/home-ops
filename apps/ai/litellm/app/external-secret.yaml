---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm-secret
spec:
  refreshInterval: 55m

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: *name
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        master-key: '{{ index . "master-key" }}'
        salt-key: '{{ index . "salt-key" }}'
        GITHUB_MCP_TOKEN: "{{ .token }}"

  data:
    - secretKey: master-key
      remoteRef:
        key: LiteLLM
        property: LITELLM_MASTER_KEY

    - secretKey: salt-key
      remoteRef:
        key: LiteLLM
        property: LITELLM_SALT_KEY

  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: mr-borboto-auth-token
