---
model_list:
  - model_name: qwen-35b
    litellm_params:
      model: openai/qwen-35b
      api_base: http://qwen-35b-proxy.ai.svc.cluster.local:8080
      api_key: "N/A"
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: gemma-4-26b-a4b
    litellm_params:
      model: openai/gemma-4-26b-a4b
      api_base: http://gemma-4-26b-a4b-proxy.ai.svc.cluster.local:8080
      api_key: "N/A"

  - model_name: qwen3-0.6b
    litellm_params:
      model: openai/qwen3-0.6b
      api_base: http://qwen3-0-6b.ai.svc.cluster.local:8080
      api_key: "N/A"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  prometheus_adapter: true
  require_auth_for_metrics_endpoint: false
  drop_params: true
  request_timeout: 600
  num_retries: 2
  retry_after: 5
  set_verbose: false
