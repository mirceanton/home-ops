      model: openai/qwen3.7-plus
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  - model_name: qwen3.7-max
    litellm_params:
      model: openai/qwen3.7-max
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- QWEN 3.8 -----------------------------------
  - model_name: qwen3.8-max-preview
    litellm_params:
      model: openai/qwen3.8-max-preview
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- GLM -----------------------------------
  - model_name: glm-5.2
    litellm_params:
      model: openai/glm-5.2
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ---------------------------------- DEEPSEEK ----------------------------------
  - model_name: deepseek-v4-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ------------------------------------ WAN ------------------------------------
