model_list:
  # -------------------------------- QWEN EMBEDDING --------------------------------
  - model_name: qwen3-embedding-0.6b
    litellm_params:
      model: openai/qwen3-embedding-0.6b
      api_base: http://qwen3-embedding-0-6b.ai.svc.cluster.local:8080/v1
      api_key: "N/A"
    model_info:
      mode: embedding

  # ----------------------------------- QWEN 3.6 -----------------------------------
  - model_name: qwen3.6-flash
    litellm_params:
      model: openai/qwen3.6-flash
      api_base: &qwenURL https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- QWEN 3.7 -----------------------------------
  - model_name: qwen3.7-plus
