model_list:
  # -------------------------------- QWEN EMBEDDING --------------------------------
  - model_name: text-embedding-v4
    litellm_params:
      model: openai/text-embedding-v4
      api_base: &qwenURL https://token-plan.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- QWEN 3.5 -----------------------------------
  - model_name: qwen3.5-flash
    litellm_params:
      model: openai/qwen3.5-flash
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- QWEN 3.6 -----------------------------------
  - model_name: qwen3.6-flash
    litellm_params:
      model: openai/qwen3.6-flash
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  - model_name: qwen3.6-plus
    litellm_params:
      model: openai/qwen3.6-plus
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  - model_name: qwen3.6-max
    litellm_params:
      model: openai/qwen3.6-max
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- QWEN 3.7 -----------------------------------
  - model_name: qwen3.7-plus
    litellm_params:
      model: openai/qwen3.7-plus
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  - model_name: qwen3.7-max
    litellm_params:
      model: openai/qwen3.7-max
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

  # ----------------------------------- GLM -----------------------------------
  - model_name: glm-5.2
    litellm_params:
      model: openai/glm-5.2
      api_base: *qwenURL
      api_key: os.environ/QWEN_KEY

mcp_servers:
  github:
    url: "http://github-mcp.ai.svc.cluster.local:8082/mcp"
    auth_type: bearer_token
    auth_value: os.environ/GITHUB_MCP_TOKEN

  kubesearch:
    url: "http://kubesearch-mcp.ai.svc.cluster.local:3000/mcp"

  flux:
    url: "http://flux-mcp.flux-system.svc.cluster.local:9090/mcp"

  grafana:
    url: "http://grafana-mcp.monitoring-system.svc.cluster.local:8000/sse"
    transport: sse

  home_assistant:
    url: "http://home-assistant-mcp.home-automation.svc.cluster.local:8086/mcp"

  navidrome:
    url: "http://navidrome-mcp.media.svc.cluster.local:3000/mcp"

  streamarr:
    url: "http://streamarr.downloads.svc.cluster.local:8080/mcp"

  stockii:
    url: "http://stockii.bomkii.svc.cluster.local:8080/mcp/sse"
    transport: sse

router_settings:
  model_group_alias:
    hermes: qwen3.7-plus
    karakeep: qwen3.5-flash
    karakeep-embeddings: text-embedding-v4

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  store_prompts_in_spend_logs: true

litellm_settings:
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  prometheus_adapter: true
  require_auth_for_metrics_endpoint: false

  drop_params: true
  request_timeout: 600
  num_retries: 2
  retry_after: 5
  set_verbose: false

  mcp_semantic_tool_filter:
    enabled: true
    embedding_model: "text-embedding-v4"
    top_k: 10
    # Relevant and irrelevant tools both score ~0.7-0.9 with this model, so no
    # threshold cleanly separates them; rely on top_k and keep this at 0 so a
    # genuinely-relevant tool is never dropped by score.
    similarity_threshold: 0.0
