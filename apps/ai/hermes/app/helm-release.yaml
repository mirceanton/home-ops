---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: hermes

  values:
    controllers:
      hermes:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          fix-run:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command: ["sh", "-c", "chown 10000:10000 /run && chmod 755 /run"]
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

          init:
            image:
              repository: docker.io/mikefarah/yq
              tag: "4"
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                if [ -f /opt/data/config.yaml ]; then
                  yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' \
                    /opt/data/config.yaml /tmp/config.yaml > /tmp/merged.yaml
                  mv /tmp/merged.yaml /opt/data/config.yaml
                else
                  cp /tmp/config.yaml /opt/data/config.yaml
                fi
                cp /tmp/.env /opt/data/.env

        containers:
          app:
            # Single container: the image's own s6-rc supervisor starts
            # both the messaging gateway and (when HERMES_DASHBOARD=true)
            # the dashboard service internally, based on persisted
            # profile state on the data volume. Passing CLI args like
            # "gateway run" here fights that supervisor and crashes with
            # "gateway is already running under s6". `sleep infinity` is
            # the wrapper script's documented way to give the container
            # an inert foreground process while s6 runs the real
            # services in the background.
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
            args: ["sleep", "infinity"]

            envFrom:
              - secretRef: { name: hermes-secret }
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: Europe/Bucharest
              HERMES_DASHBOARD: "true"

            resources:
              requests:
                cpu: 150m
                memory: 768Mi
              limits:
                memory: 2Gi
            ports:
              - containerPort: &dashboard_port 9119
                name: dashboard
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      terminationGracePeriodSeconds: 600
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      dashboard:
        controller: hermes
        ports:
          http:
            port: *dashboard_port

    route:
      dashboard:
        hostnames: ["hermes.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      data:
        existingClaim: hermes
        globalMounts:
          - path: /opt/data

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

      run:
        type: emptyDir
        globalMounts:
          - path: /run

      config-secret:
        type: secret
        name: hermes-secret
        defaultMode: 0400
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
          - path: /tmp/.env
            subPath: env
