---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app hermes
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  targetNamespace: ai

  path: ./apps/ai/hermes/app
  components:
    - ../../../../components/volsync/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 1Gi
      VOLSYNC_PUID: "10000"
      VOLSYNC_PGID: "10000"

  dependsOn:
    - name: 1password-connect
      namespace: security-system
    - name: litellm
      namespace: ai
    - name: volsync
      namespace: storage-system
