---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./externalsecret.yaml
  - ./helm-release.yaml
  - ./oci-repository.yaml

configMapGenerator:
  - name: librechat-config
    options:
      disableNameSuffixHash: true
    files:
      - librechat.yaml=./files/librechat.yaml
