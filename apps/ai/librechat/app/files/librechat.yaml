---
version: "1"

endpoints:
  custom:
    - name: llama-server
      apiKey: "llama"
      baseURL: "http://llama-server.ai.svc.cluster.local:8080/v1"
      models:
        default: ["local"]
        fetch: true
      titleConvo: true
      titleModel: "local"
      summarize: false

mcpServers:
  grafana:
    url: http://grafana-mcp.monitoring-system.svc.cluster.local:8000/sse
    type: sse

  homeassistant:
    url: http://home-assistant-mcp.home-automation.svc.cluster.local:8086/sse
    type: sse

  flux:
    url: http://flux-mcp.flux-system.svc.cluster.local:9090/mcp
    type: streamable-http
