---
version: "1"
# TODO: OCR
# TODO: RAG?
endpoints:
  custom:
    - name: LiteLLM
      apiKey: "$${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm.ai.svc.cluster.local:4000/v1"
      models:
        default: ["gemma-4", "qwen-35b", "qwen3-0.6b"]
        fetch: true
      titleConvo: true
      titleModel: "qwen3-0.6b"
      summarize: false
      temperature: 0.2
      modelSpecs:
        - name: "gemma-4"
          maxContextTokens: 81920
        - name: "qwen-35b"
          maxContextTokens: 32768
        - name: "qwen3-0.6b"
          maxContextTokens: 8192

webSearch:
  searchProvider: searxng
  apis:
    searxng:
      url: http://searxng-app.ai.svc.cluster.local:8080
  safeSearch: moderate
  rerank: false

mcpSettings:
  allowedDomains:
    - "*.cluster.local"

mcpServers:
  grafana:
    url: http://grafana-mcp.monitoring-system.svc.cluster.local:8000/sse
    type: sse

  homeassistant:
    url: http://home-assistant-mcp.home-automation.svc.cluster.local:8086/sse
    type: sse

  flux:
    url: http://flux-mcp.flux-system.svc.cluster.local:9090/mcp
    type: streamable-http

  navidrome:
    url: http://navidrome-mcp.media.svc.cluster.local:3000/mcp
    type: streamable-http
