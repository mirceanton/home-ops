---
version: "1"
# TODO: OCR
# TODO: RAG?
endpoints:
  custom:
    - name: LiteLLM
      apiKey: "$${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm.ai.svc.cluster.local:4000/v1"
      models:
        default: ["gemma-4-26b-a4b", "qwen-35b"]
        fetch: true
      summarize: false
      temperature: 0.2
      modelSpecs:
        - name: "gemma-4-26b-a4b"
          maxContextTokens: 262144
        - name: "qwen-35b"
          maxContextTokens: 262144

webSearch:
  searchProvider: searxng
  apis:
    searxng:
      url: http://searxngx.tools.svc.cluster.local:8080
  safeSearch: 1
  rerank: false

interface:
  modelSelect: true
  parameters: false
  presets: true
  bookmarks: true
  multiConvo: true
  temporaryChat: false
  runCode: false
  webSearch: true
  fileSearch: false
  fileCitations: false
  autoSubmitFromUrl: false
  memories: false
  addedMCPServers: false
  endpointsMenu: false
  sidePanel: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
  prompts:
    use: false
    create: false
    share: false
    public: false
  agents:
    use: true
    create: false
    share: false
    public: false
  mcpServers:
    use: true
    create: false
    share: false
    public: false

mcpSettings:
  allowedDomains:
    - "*.cluster.local"

mcpServers:
  grafana:
    url: http://grafana-mcp.monitoring-system.svc.cluster.local:8000/sse
    type: sse

  homeassistant:
    url: http://home-assistant-mcp.home-automation.svc.cluster.local:8086/mcp
    type: streamable-http

  flux:
    url: http://flux-mcp.flux-system.svc.cluster.local:9090/mcp
    type: streamable-http

  navidrome:
    url: http://navidrome-mcp.media.svc.cluster.local:3000/mcp
    type: streamable-http
