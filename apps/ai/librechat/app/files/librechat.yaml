---
version: "1"

endpoints:
  custom:
    - name: Ollama
      apiKey: "ollama"
      baseURL: "http://ollama.ai.svc.cluster.local:11434/v1"
      models:
        default: ["qwen3:4b"]
        fetch: true
      titleConvo: true
      titleModel: "qwen3:1.7b"
      summarize: false

mcpServers:
  grafana:
    url: http://grafana-mcp.monitoring-system.svc.cluster.local:8000/sse
    type: sse

  homeassistant:
    url: http://homeassistant-mcp.home-automation.svc.cluster.local:8086/sse
    type: sse

  flux:
    url: http://flux-mcp.flux-system.svc.cluster.local:9090/mcp
    type: streamable-http
