---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: librechat

  dependsOn:
    - name: librechat-mongodb

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      librechat:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          wait-for-mongodb:
            image:
              repository: ghcr.io/wait4x/wait4x
              tag: 3.6.0
            args: ["tcp", "librechat-mongodb:27017"]

        containers:
          app:
            image:
              repository: ghcr.io/danny-avila/librechat
              tag: v0.8.6
            envFrom:
              - secretRef: { name: librechat-secret }
            env:
              HOST: "0.0.0.0"
              PORT: &port 3080
              DOMAIN_CLIENT: https://chat.home.mirceanton.com
              DOMAIN_SERVER: https://chat.home.mirceanton.com
              MONGO_URI: mongodb://librechat-mongodb:27017/LibreChat
              CONFIG_PATH: /config/librechat.yaml
              ENDPOINTS: custom,agents
              ALLOW_REGISTRATION: "true"
              GOOGLE_KEY: "user_provided"
              SEARXNG_INSTANCE_URL: http://searxng.ai.svc.cluster.local:8080

            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probe

            resources:
              requests:
                cpu: 10m
                memory: 350Mi
              limits:
                memory: 404Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      librechat:
        controller: librechat
        ports:
          http:
            port: *port

    route:
      home:
        hostnames: ["chat.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - name: librechat
                port: *port

    persistence:
      config:
        type: configMap
        name: librechat-config
        advancedMounts:
          librechat:
            app:
              - path: /config
      data:
        existingClaim: librechat
        advancedMounts:
          librechat:
            app:
              - path: /app/client/public/images
                subPath: images
              - path: /app/api/logs
                subPath: logs
