---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: librechat

  values:
    controllers:
      mongodb:
        containers:
          app:
            image:
              repository: mongo
              tag: 8.2.5
            resources:
              requests:
                cpu: 20m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

      rag-api:
        initContainers:
          wait-for-postgres:
            image:
              repository: wait4x/wait4x
              tag: 3.6.0
            args: ["postgresql", "$(DATABASE_URL)"]
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: uri
        containers:
          app:
            image:
              repository: ghcr.io/danny-avila/librechat-rag-api-dev
              tag: v0.7.1
            env:
              RAG_OPENAI_BASEURL: http://litellm.ai.svc.cluster.local:4000
              RAG_OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: LITELLM_MASTER_KEY
              EMBEDDINGS_PROVIDER: openai
              EMBEDDINGS_MODEL: ollama/nomic-embed-text
              VECTOR_DB_TYPE: pgvector
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: dbname
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: password
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: librechat-postgres-app
                    key: port

            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                memory: 8Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

      librechat:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-mongodb:
            image:
              repository: wait4x/wait4x
              tag: 3.6.0
            args: ["tcp", "librechat-mongodb:27017"]
        containers:
          app:
            image:
              repository: ghcr.io/danny-avila/librechat
              tag: v0.7.6
            env:
              HOST: "0.0.0.0"
              PORT: &port 3080
              DOMAIN_CLIENT: https://chat.home.mirceanton.com
              DOMAIN_SERVER: https://chat.home.mirceanton.com
              MONGO_URI: mongodb://librechat-mongodb:27017/LibreChat
              CONFIG_PATH: /config/librechat.yaml
              ENDPOINTS: custom
              ALLOW_REGISTRATION: "true"
              RAG_API_URL: http://librechat-rag-api:8000
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: JWT_SECRET
              JWT_REFRESH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: JWT_REFRESH_SECRET
              CREDS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: CREDS_KEY
              CREDS_IV:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: CREDS_IV
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: LITELLM_MASTER_KEY

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probe

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false

    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    service:
      librechat:
        controller: librechat
        ports:
          http:
            port: *port
      mongodb:
        controller: mongodb
        ports:
          mongodb:
            port: 27017
      rag-api:
        controller: rag-api
        ports:
          http:
            port: 8000

    route:
      home:
        hostnames: ["chat.home.mirceanton.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network-system
        rules:
          - backendRefs:
              - name: librechat
                port: *port

    persistence:
      config:
        type: configMap
        name: librechat-config
        advancedMounts:
          librechat:
            app:
              - path: /config
      data:
        existingClaim: librechat
        advancedMounts:
          librechat:
            app:
              - path: /app/client/public/images
                subPath: images
              - path: /app/api/logs
                subPath: logs
          mongodb:
            app:
              - path: /data/db
                subPath: mongodb
