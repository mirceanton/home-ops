---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: penpot-postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-minimal-trixie

  bootstrap:
    initdb:
      database: penpot
      owner: penpot

  storage:
    storageClass: openebs-zfs
    size: 8Gi

  walStorage:
    storageClass: openebs-zfs
    size: 2Gi

  resources:
    requests:
      cpu: 20m
      memory: 256Mi
    limits:
      memory: 512Mi

  postgresql:
    pg_hba:
      - host all all 0.0.0.0/0 scram-sha-256
