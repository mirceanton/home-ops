---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app davinci
spec:
  interval: 10m
  prune: true
  wait: true
  targetNamespace: youtube

  path: ./apps/youtube/davinci/app
  components:
    - ../../../../components/cnpg/
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  postBuild:
    substituteFrom:
      - kind: Secret
        name: davinci-cnpg-backup
        optional: true
    substitute:
      APP: *app

  decryption: { provider: sops }
  dependsOn:
    - name: cloudnative-pg-operator
      namespace: database-system
    - name: cloudnative-pg-plugins
      namespace: database-system
    - name: 1password-connect
      namespace: security-system
