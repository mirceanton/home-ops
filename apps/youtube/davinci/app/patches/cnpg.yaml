---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: ${APP}-postgres-lb
              annotations:
                metallb.io/loadBalancerIPs: 10.0.10.251
                external-dns.alpha.kubernetes.io/hostname: davinci-pg.home.mirceanton.com
            spec:
              type: LoadBalancer
