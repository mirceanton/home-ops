---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${APP}-postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: ${CNPG_REPLICAS:-1}
  # Keep in lockstep with the seed Job's image (seed.job.yaml) so the seeded
  # base backup is recoverable by this operand.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-minimal-trixie

  # VolSync-like behaviour: always bootstrap by recovering the latest backup
  # from S3. On a genuine first-ever deploy the object store is empty, so the
  # ${APP}-postgres-seed Job (see seed.job.yaml) pre-seeds an empty base backup
  # containing the ${APP} database/owner, giving recovery something to restore.
  bootstrap:
    recovery:
      source: origin
      database: ${APP}
      owner: ${APP}

  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: "${APP}-postgres-backup"
          serverName: "${APP}-postgres"

  storage:
    storageClass: ${CNPG_DATA_STORAGE_CLASS:-openebs-zfs}
    size: ${CNPG_DATA_STORAGE_SIZE:-4Gi}

  walStorage:
    storageClass: ${CNPG_WAL_STORAGE_CLASS:-openebs-zfs}
    size: ${CNPG_WAL_STORAGE_SIZE:-2Gi}

  resources:
    requests:
      cpu: ${CNPG_CPU_REQUEST:-100m}
      memory: ${CNPG_MEMORY_REQUEST:-256Mi}
    limits:
      memory: ${CNPG_MEMORY_LIMIT:-512Mi}

  postgresql:
    pg_hba:
      - host all all ${CNPG_PG_HBA_CIDR:-10.244.0.0/16} scram-sha-256

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: "${APP}-postgres-backup"

  monitoring:
    enablePodMonitor: true
