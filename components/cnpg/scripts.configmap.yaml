---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${APP}-postgres-scripts
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    mkdir -p "$${BACKUP_DIR}"

    BACKUP_FILE="$${BACKUP_DIR}/$${APP_NAME}-$(date +%Y%m%d-%H%M%S).sql.gz"
    echo "Starting backup to $${BACKUP_FILE}..."

    PGPASSWORD="$${PGPASSWORD}" pg_dump \
      --host="$${PGHOST}" \
      --port="$${PGPORT}" \
      --username="$${PGUSER}" \
      --dbname="$${PGDATABASE}" \
      --format=custom \
      --compress=6 \
      --no-owner \
      --no-acl \
      > "$${BACKUP_FILE}"

    echo "Backup completed: $${BACKUP_FILE}"

    # Keep only the last 7 backups
    ls -t "$${BACKUP_DIR}"/$${APP_NAME}-*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -f
    echo "Cleanup completed. Remaining backups:"
    ls -la "$${BACKUP_DIR}"/$${APP_NAME}-*.sql.gz 2>/dev/null || echo "No backups found"

  restore.sh: |
    #!/bin/bash
    set -euo pipefail

    # Find the latest backup if BACKUP_FILE is not specified
    if [ -z "$${BACKUP_FILE:-}" ]; then
      BACKUP_FILE=$(ls -t "$${BACKUP_DIR}"/$${APP_NAME}-*.sql.gz 2>/dev/null | head -1 || true)
      if [ -z "$${BACKUP_FILE}" ]; then
        echo "ERROR: No backup files found in $${BACKUP_DIR}"
        exit 1
      fi
    fi

    echo "Restoring from: $${BACKUP_FILE}"
    if [ ! -f "$${BACKUP_FILE}" ]; then
      echo "ERROR: Backup file not found: $${BACKUP_FILE}"
      exit 1
    fi

    echo "WARNING: This will restore the $${PGDATABASE} database!"
    echo "Proceeding with restore..."

    PGPASSWORD="$${PGPASSWORD}" pg_restore \
      --host="$${PGHOST}" \
      --port="$${PGPORT}" \
      --username="$${PGUSER}" \
      --dbname="$${PGDATABASE}" \
      --clean \
      --if-exists \
      --no-owner \
      --no-acl \
      "$${BACKUP_FILE}"

    echo "Restore completed successfully from: $${BACKUP_FILE}"
