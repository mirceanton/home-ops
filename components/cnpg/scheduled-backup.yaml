---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: "${APP}-postgres"
spec:
  schedule: "0 0/4 * * *" #? every 4h
  backupOwnerReference: self
  cluster:
    name: "${APP}-postgres"
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
