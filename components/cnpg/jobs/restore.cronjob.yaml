---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ${APP}-postgres-restore
spec:
  suspend: true # Disabled - to be triggered manually when needed
  schedule: "0 0 31 2 *" # February 31st = never runs
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568

          initContainers:
            - name: download
              image: ${CNPG_BACKUP_S3_IMAGE:-public.ecr.aws/aws-cli/aws-cli:latest}
              command: ["/bin/sh", "/scripts/download.sh"]
              env:
                - name: APP_NAME
                  value: ${APP}
                - name: S3_BUCKET
                  value: ${CNPG_BACKUP_S3_BUCKET:-home-ops-cnpg}
                - name: S3_PREFIX
                  value: ${APP}
                - name: BACKUP_KEY
                  value: "${CNPG_RESTORE_BACKUP_KEY:-}"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-cnpg-backup
                      key: ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-cnpg-backup
                      key: ACCESS_SECRET_KEY
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-cnpg-backup
                      key: ENDPOINT_URL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }

          containers:
            - name: restore
              image: ${CNPG_IMAGE:-ghcr.io/cloudnative-pg/postgresql:18.1-minimal-trixie}
              command: ["/bin/bash", "/scripts/restore.sh"]
              env:
                - name: APP_NAME
                  value: ${APP}
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-postgres-app
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-postgres-app
                      key: port
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-postgres-app
                      key: username
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-postgres-app
                      key: dbname
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${APP}-postgres-app
                      key: password
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: work
                  mountPath: /work
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }

          volumes:
            - name: scripts
              configMap:
                name: ${APP}-postgres-scripts
                defaultMode: 0755
            - name: work
              emptyDir: {}
