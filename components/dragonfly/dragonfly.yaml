---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: "${APP}-dragonfly"
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0@sha256:0fa01a2b929e704c7a9300d23e7f52002ebd39e90996fb8bb63826aed92fa06f
  replicas: 1

  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi

  args:
    - "--bind=::"
    - "--admin_bind=::"
    - --maxmemory=$(MAX_MEMORY)Mi
    - --dbnum=1
    - --dbfilename=dump
    - --proactor_threads=${DRAGONFLY_PROACTOR_THREADS:=1}
    - --cluster_mode=${DRAGONFLY_CLUSTER_MODE:=emulated}
    - --lock_on_hashtags
    - --version_check=false
    - --default_lua_flags=allow-undeclared-keys

  snapshot:
    cron: "0 */2 * * *"
    dir: /dragonfly/snapshots
    persistentVolumeClaimSpec:
      accessModes: [ReadWriteOnce]
      storageClassName: ${DRAGONFLY_SNAPSHOT_STORAGE_CLASS:=openebs-zfs-cache}
      resources:
        requests:
          storage: "${DRAGONFLY_MEMORY_LIMIT:=512Mi}"

  networkPolicyEnabled: false

  resources:
    requests:
      cpu: ${DRAGONFLY_CPU_REQUEST:=100m}
      memory: ${DRAGONFLY_MEMORY_REQUEST:=512Mi}
    limits:
      memory: ${DRAGONFLY_MEMORY_LIMIT:=512Mi}
