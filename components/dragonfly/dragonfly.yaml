---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: "${APP}-dragonfly"
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.38.0@sha256:243bf004df5e137d9432c35367d7c86e6d2b5bcb6700be4b6397fcb9306b794b
  replicas: 1

  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi

  args:
    - "--bind=::"
    - "--admin_bind=::"
    - --maxmemory=$(MAX_MEMORY)Mi
    - --dbnum=1
    - --dbfilename=
    - --proactor_threads=${DRAGONFLY_PROACTOR_THREADS:=1}
    - --cluster_mode=${DRAGONFLY_CLUSTER_MODE:=emulated}
    - --lock_on_hashtags
    - --version_check=false
    - --default_lua_flags=allow-undeclared-keys

  resources:
    requests:
      cpu: ${DRAGONFLY_CPU_REQUEST:=100m}
      memory: ${DRAGONFLY_MEMORY_REQUEST:=512Mi}
    limits:
      memory: ${DRAGONFLY_MEMORY_LIMIT:=512Mi}
