---
version: "3"

tasks:
  default:
    desc: Run all linters.
    alias: ["fix", "all"]
    cmds:
      - task lint:prettier -- --write
      - task: actions

  check:
    desc: Check all files for linting issues without modifying them
    cmds:
      - task lint:prettier -- --check
      - task lint:actions

  actions: actionlint {{.CLI_ARGS}}
  prettier: prettier {{.CLI_ARGS}} .
