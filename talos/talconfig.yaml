---
clusterName: home-ops
endpoint: "https://home-ops.mgmt.h.mirceanton.com:6443"

# renovate: depName=ghcr.io/siderolabs/installer datasource=docker
talosVersion: v1.13.7

# renovate: depName=ghcr.io/siderolabs/kubelet datasource=docker
kubernetesVersion: v1.36.2

additionalApiServerCertSans: &san
  - home-ops.mgmt.h.mirceanton.com
  - 10.0.0.15
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *san

allowSchedulingOnControlPlanes: true
cniConfig: { name: none }

nodes:
  - hostname: home-ops
    ipAddress: 10.0.0.15
    controlPlane: true
    installDiskSelector: { size: "<= 300Gb" }
    nodeLabels:
      nvidia.com/gpu.present: "true"

    networkInterfaces:
      - interface: enp6s0 #? Management
        dhcp: true
        dhcpOptions: { routeMetric: 1024 }

      - interface: bond0
        mtu: 9000
        dhcp: false
        bond:
          mode: 802.3ad
          lacpRate: fast
          interfaces: [enp4s0, enp4s0d1]
          xmitHashPolicy: layer3+4
          miimon: 100
          updelay: 200
          downdelay: 200
        vlans:
          - vlanId: 1255
            dhcp: true
            dhcpOptions: { routeMetric: 4095 }
          - vlanId: 1010
            dhcp: true
            dhcpOptions: { routeMetric: 4095 }

    patches:
      - "@./patches/nvidia.yaml"
      - "@./patches/uinput.yaml"
      - "@./patches/zfs.yaml"
      - | #? Use the Intel Optane for the etcd disk
        machine:
          disks:
            - device: /dev/nvme0n1
              partitions:
                - mountpoint: /var/lib/etcd
    schematic:
      customization:
        extraKernelArgs:
          - cpufreq.default_governor=performance
          - amdgpu.gttsize=40960 # 40GiB GTT ceiling for iGPU LLM inference
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/amdgpu
            - siderolabs/nvidia-container-toolkit-production
            - siderolabs/nvidia-open-gpu-kernel-modules-production
            - siderolabs/zfs
            - siderolabs/iscsi-tools
            - siderolabs/uinput # mouse/keyboard emulation (Sunshine)
            - siderolabs/uhid # gamepad emulation (Sunshine)
            - siderolabs/joydev # legacy joystick interface (Sunshine)

controlPlane:
  patches:
    - "@./patches/cluster-discovery.yaml"
    - "@./patches/kubelet-tuning.yaml"
    - "@./patches/etcd-tuning.yaml"
    - "@./patches/disable-search-domain.yaml"
    - "@./patches/kubeprism.yaml"
    - "@./patches/network-binding.yaml"
    - "@./patches/mutating-admission.yaml"
    - "@./patches/host-dns.yaml"
    - "@./patches/disable-admission-control.yaml"
    - "@./patches/sysctls.yaml"
    - "@./patches/disable-kube-proxy.yaml" #? Cilium CNI
    - "@./patches/registry-mirrors.yaml"
    - "@./patches/talos-api-access.yaml"
    - |-
      cluster:
        apiServer:
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 6Gi
