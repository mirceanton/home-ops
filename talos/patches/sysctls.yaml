---
machine:
  sysctls:
    # Inotify limits - essential for file-watching apps
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "1048576"

    # BBR congestion control - Google's algorithm for better throughput & lower latency
    net.ipv4.tcp_congestion_control: bbr
    # Socket backlog - max pending connections (useful for services with many clients)
    net.core.somaxconn: "65535"

    # Fair queue scheduler - required for BBR congestion control
    net.core.default_qdisc: fq

    # Socket buffer sizes - increased for better network throughput
    net.core.rmem_max: "16777216"
    net.core.wmem_max: "16777216"

    # Allow unprivileged containers to use ping
    net.ipv4.ping_group_range: 0 2147483647

    # TCP Fast Open - reduces latency by sending data in SYN packet (3 = enabled for both client & server)
    net.ipv4.tcp_fastopen: "3"

    # Path MTU discovery - helps avoid fragmentation issues
    net.ipv4.tcp_mtu_probing: "1"

    # TCP buffer sizes (min, default, max) - tuned for better throughput
    net.ipv4.tcp_rmem: 4096 87380 16777216
    net.ipv4.tcp_wmem: 4096 65536 16777216

    # Disable slow start after idle - better for bursty traffic patterns
    net.ipv4.tcp_slow_start_after_idle: "0"

    # User namespaces - required by Steam, Firefox/Chromium sandboxes, etc.
    # Talos defaults to 0 (disabled). 15000 matches the Ubuntu default.
    user.max_user_namespaces: "15000"

    # Memory map limit - GameGuard (anti-cheat) and Vulkan require a much higher
    # limit than the kernel default of 65530; 2097152 is the Steam Deck default.
    vm.max_map_count: "2097152"

    # Keep filesystem metadata (dentries/inodes) in cache longer - reduces Steam
    # library scan time on repeated launches. Default 100 evicts aggressively.
    vm.vfs_cache_pressure: "50"

    # Allow same-UID ptrace without CAP_SYS_PTRACE - GameGuard inspects the game
    # process via ptrace to verify integrity; scope 2 (require capability) blocks
    # it entirely since the container runs with no capabilities. Scope 0 allows
    # any process to ptrace others it owns.
    kernel.yama.ptrace_scope: "0"

    # Reserve Sunshine/Moonlight streaming ports so the kernel never picks them
    # as ephemeral source ports for outgoing connections. Without this, a
    # persistent kube-apiserver→etcd connection can claim port 47984, preventing
    # Sunshine from binding when the pod runs with hostNetwork=true.
    net.ipv4.ip_local_reserved_ports: "47984,47989,47990,47998,47999,48000,48010,50000-50001"
