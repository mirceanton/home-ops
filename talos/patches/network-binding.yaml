---
#? Bind the kubelet and etcd to the management network subnet
#? Expose controller-manager and scheduler metrics for Prometheus scraping
machine:
  kubelet:
    nodeIP:
      validSubnets: ["10.0.0.0/24"]

cluster:
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
    advertisedSubnets: ["10.0.0.0/24"]
  controllerManager:
    extraArgs:
      bind-address: "0.0.0.0"
  scheduler:
    extraArgs:
      bind-address: "0.0.0.0"
