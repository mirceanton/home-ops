# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate
permissions: { contents: read }

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Run flate test
        run: mise exec -- flate test all --path ./apps | tee test

  diff:
    name: Flate Diff
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Run flate diff
        id: diff
        env:
          FLATE_BASE: ${{ github.event.repository.default_branch }}
        run: |
          DIFF=$(mise exec -- flate diff all -o diff 2>&1 || true)
          if [ -n "$DIFF" ]; then
            {
              echo "## Flate Diff"
              echo ""
              echo '```diff'
              echo "$DIFF"
              echo '```'
            } > diff.md
            echo "diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: ${{ steps.diff.outputs.diff == 'true' }}
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Find Comment
        if: ${{ steps.diff.outputs.diff == 'true' }}
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: ${{ steps.app-token.outputs.app-slug }}[bot]
          body-includes: "## Flate Diff"

      - name: Create or Update Comment
        if: ${{ steps.diff.outputs.diff == 'true' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body-file: diff.md
