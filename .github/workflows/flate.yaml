# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate
permissions: { contents: read }

on:
  pull_request:
    branches: ["main"]
    paths:
      - apps/**
      - components/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Flate Test
    runs-on: ubuntu-latest
    container: ghcr.io/mirceanton/actions-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: mise install

      - name: Run flate test
        run: mise exec -- flate test all --path ./apps | tee test

  diff:
    name: Flate Diff
    runs-on: ubuntu-latest
    container: ghcr.io/mirceanton/actions-runner:latest
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: pull
          persist-credentials: false

      - name: Checkout Default Branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default
          persist-credentials: false

      - name: Install dependencies
        working-directory: pull
        run: mise install

      - name: Run flate diff
        id: diff
        working-directory: pull
        continue-on-error: true
        run: |
          {
            echo 'diff<<EOF'
            mise exec -- flate diff all \
              --path ./apps \
              --path-orig ../default/apps \
              --output diff
            echo EOF
          } | tee "${GITHUB_OUTPUT}"

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: ${{ steps.diff.outputs.diff != '' }}
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Find Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: ${{ steps.app-token.outputs.app-slug }}[bot]
          body-includes: "## Flate Diff"

      - name: Create or Update Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Flate Diff

            ```diff
            ${steps.diff.outputs.diff}
            ```
