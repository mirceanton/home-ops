---
name: Lint
permissions: {contents: read}

on:
  workflow_dispatch: {}
  push: {}

jobs:
  check:
    runs-on: infra-runners
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Run linters
        run: task lint:check
