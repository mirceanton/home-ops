---
name: Lint
permissions: { contents: read }

on:
  workflow_dispatch: {}
  push: {}

jobs:
  check:
    runs-on: ubuntu-slim
    container: ghcr.io/mirceanton/actions-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: mise install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run linters
        run: mise exec -- task lint:check
