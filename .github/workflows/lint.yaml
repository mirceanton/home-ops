---
name: Lint
permissions: {contents: read}

on:
  workflow_dispatch: {}
  push: {}

jobs:
  check:
    runs-on: infra-runners
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: mise install

      - name: Run linters
        run: mise exec -- task lint:check
