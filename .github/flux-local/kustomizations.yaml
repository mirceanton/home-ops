---
# This file is used ONLY by flux-local for CI validation.
# It provides a set of root Kustomization CRs with explicit metadata.namespace so that
# flux-local can follow each spec.path via `kustomize build`, which applies the namespace
# transformer in each apps/<ns>/kustomization.yaml and correctly resolves child KS namespaces.
#
# These are NOT deployed to the cluster — FluxInstance (Helm) manages the actual sync.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ai
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/ai
  sourceRef:
    kind: GitRepository
    name: flux-system
---
