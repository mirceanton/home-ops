---
# This file is used ONLY by flux-local for CI validation.
# It mirrors the root Kustomization that FluxInstance creates at runtime,
# providing an explicit metadata.namespace so flux-local can traverse
# the apps/ tree via `kustomize build` (applying namespace transformers).
# It is NOT deployed to the cluster.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps
  sourceRef:
    kind: GitRepository
    name: flux-system
