---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - descheduler.helm-repository.yaml
  - descheduler.helm-release.yaml

configMapGenerator:
  - name: descheduler-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=descheduler.helm-values.yaml
