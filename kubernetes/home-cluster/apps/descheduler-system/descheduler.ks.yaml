---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-descheduler
  namespace: flux-system
  labels:
    home-ops.mirceanton.com/group: system-apps
spec:
  path: kubernetes/home-cluster/apps/descheduler-system/descheduler
  sourceRef:
    kind: GitRepository
    name: home-ops-git-repo

  targetNamespace: descheduler-system
  dependsOn:
    - name: cluster-apps-flux-discord-notifications

  wait: true
  prune: true
  interval: 5m
  timeout: 30m

  decryption:
    provider: sops
    secretRef:
      name: sops-age
