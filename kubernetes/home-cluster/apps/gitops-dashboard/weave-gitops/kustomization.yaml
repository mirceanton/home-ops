---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization

resources:
  - weaveworks.helm-repository.yaml
  - weave-gitops.helm-release.yaml
  - cluster-user-auth.secret.sops.yaml
  - oidc-auth.secret.sops.yaml

configMapGenerator:
  - name: weave-gitops-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=weave-gitops.helm-values.yaml
