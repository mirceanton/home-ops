---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-weave-gitops
  namespace: flux-system
  labels:
    home-ops.mirceanton.com/group: admin-apps
spec:
  path: kubernetes/home-cluster/apps/gitops-dashboard/weave-gitops
  sourceRef:
    kind: GitRepository
    name: cluster-apps

  targetNamespace: gitops-dashboard
  dependsOn:
    - name: cluster-terraforms-keycloak

  wait: true
  prune: true
  interval: 5m
  timeout: 30m
