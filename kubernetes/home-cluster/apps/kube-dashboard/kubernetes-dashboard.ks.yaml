---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-kube-dashboard
  namespace: flux-system
  labels:
    home-ops.mirceanton.com/group: admin-apps
spec:
  path: kubernetes/home-cluster/apps/kube-dashboard/kubernetes-dashboard
  sourceRef:
    kind: GitRepository
    name: kubernetes-dashboard

  targetNamespace: kube-dashboard
  dependsOn:
    - name: cluster-apps-flux-discord-notifications
