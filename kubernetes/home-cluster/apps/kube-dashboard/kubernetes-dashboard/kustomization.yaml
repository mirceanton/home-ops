---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kubernetes-dashboard.helm-repository.yaml
  - kubernetes-dashboard.helm-release.yaml

configMapGenerator:
  - name: kubernetes-dashboard-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=kubernetes-dashboard.helm-values.yaml
