---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-oauth2-proxy
  namespace: flux-system
  labels:
    home-ops.mirceanton.com/group: admin-apps
spec:
  path: kubernetes/home-cluster/apps/kube-dashboard/oauth2-proxy
  sourceRef:
    kind: GitRepository
    name: home-ops-git-repo

  targetNamespace: kube-dashboard
  dependsOn:
    - name: cluster-apps-reloader
    - name: cluster-apps-reflector
    - name: cluster-terraforms-keycloak

  wait: true
  prune: true
  interval: 5m
  timeout: 30m
