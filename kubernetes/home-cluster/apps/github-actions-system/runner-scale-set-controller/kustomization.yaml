---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - runner-scale-set-controller.helm-repository.yaml
  - runner-scale-set-controller.helm-release.yaml

configMapGenerator:
  - name: runner-scale-set-controller-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=runner-scale-set-controller.helm-values.yaml
