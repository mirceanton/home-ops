---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-terraforms
  namespace: flux-system
spec:
  path: kubernetes/infra-cluster/terraforms
  dependsOn:
    - name: cluster-config

  wait: true
  prune: true
  interval: 5m
  timeout: 30m

  sourceRef:
    kind: GitRepository
    name: home-ops-git-repo

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  patches:
    # ====================================================================
    # Inject home-ops git repository as KS source
    # ====================================================================
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: patching.home.mirceanton.com/source-ref=true
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          sourceRef:
            kind: GitRepository
            name: home-ops-git-repo

    # ====================================================================
    # Inject postBuild substitution config into KS
    # ====================================================================
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: patching.home.mirceanton.com/post-build=true
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: cluster-settings
              - kind: Secret
                name: cluster-secrets

    # ====================================================================
    # Inject sops decryption config into KS
    # ====================================================================
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: patching.home.mirceanton.com/decryption=true
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          decryption:
            provider: sops
            secretRef:
              name: sops-age

    # ====================================================================
    # Inject common intervals into KS
    # ====================================================================
    - target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
        labelSelector: patching.home.mirceanton.com/intervals=true
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          interval: 10m
          retryInterval: 1m
          timeout: 15m
